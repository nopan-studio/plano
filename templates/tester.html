<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plano · API Tester</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:          #0d0d0d;
  --panel:       #151515;
  --panel2:      #1a1a1a;
  --surface:     #222;
  --surface2:    #2a2a2a;
  --border:      #2a2a2a;
  --border2:     #333;
  --text:        #e2e2e2;
  --text-mid:    #888;
  --text-dim:    #444;
  --accent:      #FF6D5A;
  --accent-dim:  rgba(255,109,90,.12);
  --accent-glow: rgba(255,109,90,.25);
  --green:       #4ade80;
  --green-dim:   rgba(74,222,128,.12);
  --blue:        #60a5fa;
  --blue-dim:    rgba(96,165,250,.12);
  --amber:       #fbbf24;
  --amber-dim:   rgba(251,191,36,.12);
  --rose:        #fb7185;
  --rose-dim:    rgba(251,113,133,.12);
  --purple:      #a78bfa;
  --purple-dim:  rgba(167,139,250,.12);
  --teal:        #2dd4bf;
  --teal-dim:    rgba(45,212,191,.12);
  --mono:        'JetBrains Mono', monospace;
  --sans:        'Outfit', sans-serif;
  --r:           6px;
  --r-lg:        10px;
}

*,*::before,*::after { box-sizing:border-box; margin:0; padding:0 }
html,body { height:100%; overflow:hidden; font-family:var(--sans); background:var(--bg); color:var(--text); font-size:13px; -webkit-font-smoothing:antialiased }

/* ── Layout ── */
#app { display:grid; grid-template-columns:300px 1fr; grid-template-rows:52px 1fr; height:100vh }
#topbar { grid-column:1/-1; display:flex; align-items:center; gap:10px; padding:0 16px; background:var(--panel); border-bottom:1px solid var(--border); z-index:10 }
#collection { background:var(--panel); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden }
#main { display:grid; grid-template-rows:auto 1fr; overflow:hidden }
#request-area { padding:14px 16px; border-bottom:1px solid var(--border); display:flex; flex-direction:column; gap:10px }
#response-area { overflow:hidden; display:flex; flex-direction:column }

/* ── Topbar ── */
.logo { font-size:15px; font-weight:700; color:var(--text); letter-spacing:-.3px }
.logo em { color:var(--accent); font-style:normal }
.tb-sep { width:1px; height:18px; background:var(--border2); margin:0 2px }
.env-row { display:flex; align-items:center; gap:6px }
.env-label { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.06em; color:var(--text-dim) }
#base-url { background:var(--surface); border:1px solid var(--border2); border-radius:var(--r); color:var(--text); font-family:var(--mono); font-size:11px; padding:5px 9px; outline:none; width:220px; transition:.12s }
#base-url:focus { border-color:var(--accent) }
.tb-right { margin-left:auto; display:flex; gap:8px; align-items:center }
.history-btn { display:flex; align-items:center; gap:5px; padding:5px 10px; border-radius:var(--r); border:1px solid var(--border2); background:transparent; color:var(--text-mid); font-family:var(--sans); font-size:11px; font-weight:600; cursor:pointer; transition:.12s }
.history-btn:hover { background:var(--surface); color:var(--text) }
#health-dot { width:8px; height:8px; border-radius:50%; background:var(--text-dim); transition:background .3s; flex-shrink:0 }
#health-dot.ok  { background:var(--green); box-shadow:0 0 6px var(--green) }
#health-dot.err { background:var(--rose);  box-shadow:0 0 6px var(--rose) }
#health-label { font-size:11px; color:var(--text-dim); font-family:var(--mono) }

/* ── Collection ── */
.col-header { padding:10px 12px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0 }
.col-title { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--text-dim) }
.col-search { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:var(--r); color:var(--text); font-family:var(--sans); font-size:11px; padding:6px 9px; outline:none; margin:8px 0 4px; transition:.12s }
.col-search:focus { border-color:var(--accent) }
.col-list { flex:1; overflow-y:auto }
.col-group { border-bottom:1px solid var(--border) }
.col-group-header { display:flex; align-items:center; gap:7px; padding:8px 10px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--text-dim); cursor:pointer; user-select:none; transition:.1s }
.col-group-header:hover { background:rgba(255,255,255,.02); color:var(--text-mid) }
.col-group-header .arr { margin-left:auto; font-size:9px; transition:transform .18s }
.col-group-header.closed .arr { transform:rotate(-90deg) }
.col-items { padding:2px 0 4px }
.col-items.hidden { display:none }
.col-item { display:flex; align-items:center; gap:8px; padding:7px 10px 7px 16px; cursor:pointer; transition:.1s; border-left:2px solid transparent; border-radius:0 var(--r) var(--r) 0; margin:1px 6px 1px 0 }
.col-item:hover { background:var(--surface) }
.col-item.active { background:var(--accent-dim); border-left-color:var(--accent) }
.method-tag { font-size:9px; font-weight:700; padding:2px 5px; border-radius:3px; font-family:var(--mono); min-width:38px; text-align:center; flex-shrink:0 }
.m-GET    { background:var(--green-dim);  color:var(--green) }
.m-POST   { background:var(--blue-dim);   color:var(--blue) }
.m-PUT    { background:var(--amber-dim);  color:var(--amber) }
.m-DELETE { background:var(--rose-dim);   color:var(--rose) }
.m-PATCH  { background:var(--teal-dim);   color:var(--teal) }
.col-item-name { font-size:11px; font-weight:500; color:var(--text); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
.col-item-path { font-size:9px; color:var(--text-dim); font-family:var(--mono); margin-top:1px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap }

/* ── Request builder ── */
.req-url-row { display:flex; gap:8px; align-items:center }
.method-select { background:var(--surface); border:1px solid var(--border2); border-radius:var(--r); color:var(--text); font-family:var(--mono); font-size:11px; font-weight:700; padding:7px 10px; outline:none; cursor:pointer; flex-shrink:0 }
#url-input { flex:1; background:var(--surface); border:1px solid var(--border2); border-radius:var(--r); color:var(--text); font-family:var(--mono); font-size:12px; padding:7px 12px; outline:none; transition:.12s }
#url-input:focus { border-color:var(--accent) }
.send-btn { padding:7px 18px; border-radius:var(--r); border:none; background:var(--accent); color:#fff; font-family:var(--sans); font-size:12px; font-weight:700; cursor:pointer; transition:.12s; white-space:nowrap; display:flex; align-items:center; gap:6px }
.send-btn:hover { background:#ff5242; box-shadow:0 4px 12px var(--accent-glow) }
.send-btn:disabled { background:var(--surface2); color:var(--text-dim); cursor:not-allowed; box-shadow:none }
.send-btn.loading { animation:pulse 1s infinite }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.6} }

/* Body editor */
.body-tabs { display:flex; gap:2px; align-items:center }
.body-tab { padding:4px 10px; border-radius:var(--r) var(--r) 0 0; font-size:11px; font-weight:600; cursor:pointer; color:var(--text-dim); border:1px solid transparent; border-bottom:none; transition:.1s }
.body-tab.active { background:var(--surface); color:var(--text); border-color:var(--border2) }
.body-tab:hover:not(.active) { color:var(--text-mid) }
.body-note { font-size:10px; color:var(--text-dim); margin-left:auto; font-family:var(--mono) }
.body-editor-wrap { position:relative }
#body-editor { width:100%; background:var(--surface); border:1px solid var(--border2); border-radius:0 var(--r) var(--r) var(--r); color:var(--text); font-family:var(--mono); font-size:11px; padding:10px 12px; outline:none; resize:vertical; min-height:90px; max-height:200px; line-height:1.6; transition:border-color .12s; tab-size:2 }
#body-editor:focus { border-color:var(--accent) }
.format-btn { position:absolute; top:6px; right:6px; padding:3px 7px; border-radius:4px; border:1px solid var(--border2); background:var(--surface2); color:var(--text-dim); font-size:10px; font-weight:600; cursor:pointer; transition:.1s }
.format-btn:hover { color:var(--text); border-color:var(--accent) }

/* ── Response area ── */
.res-header { display:flex; align-items:center; gap:10px; padding:10px 16px; border-bottom:1px solid var(--border); flex-shrink:0 }
.res-title { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--text-dim) }
.status-badge { font-size:11px; font-weight:700; padding:3px 9px; border-radius:20px; font-family:var(--mono) }
.status-2xx { background:var(--green-dim);  color:var(--green) }
.status-3xx { background:var(--blue-dim);   color:var(--blue) }
.status-4xx { background:var(--amber-dim);  color:var(--amber) }
.status-5xx { background:var(--rose-dim);   color:var(--rose) }
.res-time { font-size:10px; color:var(--text-dim); font-family:var(--mono) }
.res-size { font-size:10px; color:var(--text-dim); font-family:var(--mono) }
.copy-btn { margin-left:auto; padding:4px 9px; border-radius:var(--r); border:1px solid var(--border2); background:transparent; color:var(--text-dim); font-size:10px; font-weight:600; cursor:pointer; transition:.1s; font-family:var(--sans) }
.copy-btn:hover { background:var(--surface); color:var(--text) }
.res-tabs { display:flex; gap:0; border-bottom:1px solid var(--border); flex-shrink:0 }
.res-tab { padding:7px 14px; font-size:11px; font-weight:600; cursor:pointer; color:var(--text-dim); border-bottom:2px solid transparent; transition:.1s }
.res-tab.active { color:var(--accent); border-bottom-color:var(--accent) }
.res-tab:hover:not(.active) { color:var(--text-mid) }
.res-body { flex:1; overflow:auto; padding:14px 16px; font-family:var(--mono); font-size:11px; line-height:1.7 }
.res-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:10px; color:var(--text-dim); user-select:none }
.res-empty .big { font-size:32px; opacity:.3 }

/* JSON syntax */
.j-key   { color:#60a5fa }
.j-str   { color:#4ade80 }
.j-num   { color:#fbbf24 }
.j-bool  { color:#f472b6 }
.j-null  { color:#94a3b8 }

/* Headers table */
.headers-table { width:100%; border-collapse:collapse; font-size:11px; font-family:var(--mono) }
.headers-table th { text-align:left; padding:5px 8px; border-bottom:1px solid var(--border); color:var(--text-dim); font-weight:600; font-size:10px; text-transform:uppercase; letter-spacing:.05em }
.headers-table td { padding:5px 8px; border-bottom:1px solid var(--border); vertical-align:top }
.headers-table td:first-child { color:var(--blue) }
.headers-table td:last-child { color:var(--text-mid) }

/* History drawer */
#history-drawer { position:fixed; right:0; top:52px; bottom:0; width:320px; background:var(--panel); border-left:1px solid var(--border); z-index:50; transform:translateX(100%); transition:transform .2s ease; display:flex; flex-direction:column }
#history-drawer.open { transform:none }
.drawer-header { padding:12px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-shrink:0 }
.drawer-title { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--text-dim) }
.drawer-close { width:22px; height:22px; border-radius:4px; background:transparent; border:none; color:var(--text-dim); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:15px; transition:.1s }
.drawer-close:hover { background:var(--surface); color:var(--text) }
.history-list { flex:1; overflow-y:auto }
.hist-item { display:flex; align-items:flex-start; gap:8px; padding:8px 12px; cursor:pointer; border-bottom:1px solid var(--border); transition:.1s }
.hist-item:hover { background:var(--surface) }
.hist-body { flex:1; min-width:0 }
.hist-path { font-size:11px; font-family:var(--mono); color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
.hist-meta { font-size:10px; color:var(--text-dim); margin-top:2px; font-family:var(--mono) }
.hist-status { font-size:10px; font-weight:700; padding:1px 5px; border-radius:3px; font-family:var(--mono); flex-shrink:0 }
.clear-hist { margin:8px 10px; padding:7px; border-radius:var(--r); border:1px dashed var(--border2); background:transparent; color:var(--text-dim); font-size:11px; font-weight:500; cursor:pointer; transition:.1s; width:calc(100% - 20px) }
.clear-hist:hover { border-color:var(--rose); color:var(--rose) }

/* Variable bar */
.var-bar { display:flex; align-items:center; gap:6px; flex-wrap:wrap }
.var-chip { display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:12px; font-size:10px; font-weight:600; font-family:var(--mono); cursor:default; user-select:all; transition:.12s }
.var-chip.set   { background:var(--green-dim); color:var(--green); border:1px solid rgba(74,222,128,.2) }
.var-chip.unset { background:var(--surface); color:var(--text-dim); border:1px solid var(--border2) }
.seed-btn { padding:4px 10px; border-radius:var(--r); border:1px solid var(--green); background:var(--green-dim); color:var(--green); font-family:var(--sans); font-size:10px; font-weight:700; cursor:pointer; transition:.12s; white-space:nowrap; display:flex; align-items:center; gap:4px }
.seed-btn:hover { background:var(--green); color:#000; box-shadow:0 2px 8px rgba(74,222,128,.3) }
.seed-btn:disabled { opacity:.5; cursor:not-allowed }

/* Toast */
#toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(6px); background:var(--surface2); border:1px solid var(--border2); border-radius:var(--r); padding:7px 14px; font-size:12px; font-weight:500; z-index:200; pointer-events:none; opacity:0; transition:opacity .18s,transform .18s; font-family:var(--sans) }
#toast.show { opacity:1; transform:translateX(-50%) translateY(0) }
#toast.ok  { border-color:var(--green); color:var(--green) }
#toast.err { border-color:var(--rose); color:var(--rose) }

/* Scrollbar */
::-webkit-scrollbar { width:4px; height:4px }
::-webkit-scrollbar-track { background:transparent }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px }
</style>
</head>
<body>
<div id="app">

<!-- Topbar -->
<div id="topbar">
  <div class="logo"><img src="/static/logo.png" style="height:24px; vertical-align:middle; margin-right:8px;"/> Plano <span style="color:var(--text-dim);font-weight:400;font-size:11px">API Tester</span></div>
  <div class="tb-sep"></div>
  <div class="env-row">
    <span class="env-label">Base URL</span>
    <input id="base-url" value="http://localhost:5000" spellcheck="false">
  </div>
  <div class="tb-sep"></div>
  <div class="var-bar" id="var-bar"></div>
  <button class="seed-btn" id="seed-btn" onclick="seedData()" title="Create a test diagram with nodes & edges so all routes work">
    <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M5 0v10M0 5h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
    Seed Data
  </button>
  <div class="tb-right">
    <div style="display:flex;align-items:center;gap:6px;cursor:pointer" onclick="checkHealth()" title="Check /health">
      <div id="health-dot"></div>
      <span id="health-label">checking…</span>
    </div>
    <div class="tb-sep"></div>
    <button class="history-btn" onclick="toggleHistory()">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="currentColor" stroke-width="1.4"/><path d="M6 3.5V6l2 1.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      History
      <span id="hist-count" style="background:var(--surface2);border-radius:10px;padding:1px 5px;font-size:9px">0</span>
    </button>
  </div>
</div>

<!-- Collection sidebar -->
<div id="collection">
  <div class="col-header">
    <span class="col-title">Endpoints</span>
    <span style="font-size:10px;color:var(--text-dim);font-family:var(--mono)" id="ep-count">0 endpoints</span>
  </div>
  <div style="padding:0 8px">
    <input class="col-search" id="ep-search" placeholder="Filter endpoints…" oninput="filterEndpoints(this.value)">
  </div>
  <div class="col-list" id="col-list"></div>
</div>

<!-- Main -->
<div id="main">

  <!-- Request builder -->
  <div id="request-area">
    <div class="req-url-row">
      <select class="method-select" id="method-select" onchange="onMethodChange()">
        <option>GET</option><option>POST</option><option>PUT</option>
        <option>PATCH</option><option>DELETE</option>
      </select>
      <input id="url-input" type="text" spellcheck="false" placeholder="{% raw %}/api/projects/{{pid}}/boards{% endraw %}" value="{% raw %}/api/projects/{{pid}}/boards{% endraw %}">
      <button class="send-btn" id="send-btn" onclick="sendRequest()">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 1l10 5-10 5V7l7-1-7-1V1z" fill="currentColor"/></svg>
        Send
      </button>
    </div>
    <div id="body-section" style="display:none">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
        <div class="body-tabs">
          <div class="body-tab active" onclick="setBodyTab('json')">JSON</div>
          <div class="body-tab" onclick="setBodyTab('raw')">Raw</div>
        </div>
        <span class="body-note" id="body-ct">Content-Type: application/json</span>
      </div>
      <div class="body-editor-wrap">
        <textarea id="body-editor" placeholder='{ "name": "Q2 Sprint Plan", "type": "process_flow" }' spellcheck="false"></textarea>
        <button class="format-btn" onclick="formatBody()">⌥ Format</button>
      </div>
    </div>
  </div>

  <!-- Response -->
  <div id="response-area">
    <div class="res-header">
      <span class="res-title">Response</span>
      <span id="res-status"></span>
      <span id="res-time" class="res-time"></span>
      <span id="res-size" class="res-size"></span>
      <button class="copy-btn" id="copy-btn" onclick="copyResponse()" style="display:none">Copy</button>
    </div>
    <div class="res-tabs">
      <div class="res-tab active" id="tab-body"   onclick="switchResTab('body')">Body</div>
      <div class="res-tab"        id="tab-headers" onclick="switchResTab('headers')">Headers</div>
    </div>
    <div class="res-body" id="res-body">
      <div class="res-empty">
        <span class="big">⟶</span>
        <span>Hit <b>Send</b> to fire a request</span>
      </div>
    </div>
  </div>
</div>

</div>

<!-- History drawer -->
<div id="history-drawer">
  <div class="drawer-header">
    <span class="drawer-title">Request History</span>
    <button class="drawer-close" onclick="toggleHistory()">×</button>
  </div>
  <div class="history-list" id="history-list"></div>
  <button class="clear-hist" onclick="clearHistory()">× Clear History</button>
</div>

<div id="toast"></div>

<script>
{% raw %}
// ── Endpoint catalogue ─────────────────────────────────────────────────────────
const ENDPOINTS = [
  {
    group:'🔵 Server', color:'var(--teal)', items:[
      { method:'GET',    name:'Health Check',       path:'/health',              body:null,
        desc:'Verify the PM server is running and DB is reachable' },
      { method:'GET',    name:'API Reference',      path:'/api',                 body:null,
        desc:'Full machine-readable API documentation (v2.0)' },
      { method:'GET',    name:'Dashboard',          path:'/dashboard',           body:null,
        desc:'Open the project management dashboard' },
      { method:'GET',    name:'Board Editor',       path:'/project/{{pid}}/editor/{{did}}',      body:null,
        desc:'Open the visual board editor' },
    ]
  },
  {
    group:'📁 Projects', color:'var(--blue)', items:[
      { method:'GET',    name:'List Projects',       path:'/api/projects',        body:null,
        desc:'List all projects with summary stats' },
      { method:'GET',    name:'Active Projects',     path:'/api/projects?status=active', body:null,
        desc:'Filter projects by active status' },
      { method:'POST',   name:'Create Project',      path:'/api/projects',
        body:{ name:'Q2 Sprint Plan', description:'Sprint planning for Q2', status:'planning', priority:'high', start_date:'2026-03-20', target_date:'2026-06-30' },
        desc:'Create a new project (auto-captures {{pid}})' },
      { method:'GET',    name:'Get Project',          path:'/api/projects/{{pid}}', body:null,
        desc:'Get project with task/milestone counts' },
      { method:'PATCH',  name:'Update Project',       path:'/api/projects/{{pid}}',
        body:{ status:'active', progress_pct:25 },
        desc:'Update project status/progress' },
      { method:'GET',    name:'Project Dashboard',    path:'/api/projects/{{pid}}/dashboard', body:null,
        desc:'Full dashboard with stats, task breakdown, recent changes' },
      { method:'DELETE', name:'Delete Project',       path:'/api/projects/{{pid}}', body:null,
        desc:'Delete project and all related data' },
    ]
  },
  {
    group:'✅ Tasks', color:'var(--green)', items:[
      { method:'GET',    name:'List Tasks',           path:'/api/projects/{{pid}}/tasks', body:null,
        desc:'List all tasks in a project' },
      { method:'GET',    name:'In-Progress Tasks',    path:'/api/projects/{{pid}}/tasks?status=in_progress', body:null,
        desc:'Filter tasks by status' },
      { method:'POST',   name:'Create Task',          path:'/api/projects/{{pid}}/tasks',
        body:{ title:'Set up CI/CD pipeline', description:'Configure GitHub Actions', assignee:'Alice', status:'todo', priority:'high', due_date:'2026-04-15', tags:['devops','infra'] },
        desc:'Create a task (auto-captures {{tid}})' },
      { method:'GET',    name:'Get Task',             path:'/api/projects/{{pid}}/tasks/{{tid}}', body:null,
        desc:'Get task details' },
      { method:'PATCH',  name:'Update Task',          path:'/api/projects/{{pid}}/tasks/{{tid}}',

// ── Environment Variables ─────────────────────────────────────────────────────
const ENV = {
  pid:  null,   // project id
  tid:  null,   // task id
  mid:  null,   // milestone id
  uid:  null,   // update id
  iid:  null,   // idea id
  did:  null,   // diagram/board id
  nid:  null,   // node id
  nid2: null,   // second node id (for edges)
  eid:  null,   // edge id
};

function resolveVars(str) {
  return String(str).replace(/\{\{(\w+)\}\}/g, (m, k) => ENV[k] != null ? ENV[k] : m);
}

function captureVars(data) {
  if (!data || typeof data !== 'object') return;

  // Project response
  if (data.id != null && data.task_count != null) {
    ENV.pid = data.id;
  }
  // Task response
  if (data.id != null && data.project_id != null && data.title != null) {
    ENV.tid = data.id;
  }
  // Milestone response
  if (data.id != null && data.project_id != null && data.task_count != null && data.due_date !== undefined) {
    ENV.mid = data.id;
  }
  // Update response
  if (data.id != null && data.update_type != null) {
    ENV.uid = data.id;
  }
  // Idea response
  if (data.id != null && data.votes != null) {
    ENV.iid = data.id;
  }
  // Board/diagram response (has node_count or nodes)
  if (data.id != null && (data.node_count != null || Array.isArray(data.nodes))) {
    ENV.did = data.id;
  }
  // Node response
  if (data.id != null && data.diagram_id != null && data.source_id == null) {
    if (ENV.nid != null && ENV.nid !== data.id) ENV.nid2 = data.id;
    ENV.nid = data.id;
  }
  // Edge response
  if (data.id != null && data.source_id != null) {
    ENV.eid = data.id;
  }
  // From full diagram (has nodes/edges arrays)
  if (Array.isArray(data.nodes) && data.nodes.length) {
    ENV.nid = data.nodes[0].id;
    if (data.nodes.length > 1) ENV.nid2 = data.nodes[1].id;
  }
  if (Array.isArray(data.edges) && data.edges.length) {
    ENV.eid = data.edges[0].id;
  }
  // From bulk response
  if (data.results) {
    for (const r of data.results) {
      if (r.data?.id && r.action === 'create_node') {
        if (ENV.nid != null && ENV.nid !== r.data.id) ENV.nid2 = r.data.id;
        ENV.nid = r.data.id;
      }
      if (r.data?.id && r.action === 'create_edge') ENV.eid = r.data.id;
    }
    if (data.diagram?.id) ENV.did = data.diagram.id;
  }
  // From list responses
  if (Array.isArray(data) && data.length) {
    const first = data[0];
    if (first.node_count != null) ENV.did = first.id;
    if (first.task_count != null) ENV.pid = first.id;
  }
  // Dashboard response
  if (data.project?.id) ENV.pid = data.project.id;

  renderVarBar();
}

function renderVarBar() {
  const bar = document.getElementById('var-bar');
  bar.innerHTML = Object.entries(ENV).map(([k,v]) =>
    `<span class="var-chip ${v!=null?'set':'unset'}" title="${k}: ${v??'not set'}">
      {{${k}}}${v!=null ? ' = '+v : ''}
    </span>`
  ).join('');
}

// ── Seed Data ────────────────────────────────────────────────────────────────
async function seedData() {
  const btn = document.getElementById('seed-btn');
  btn.disabled = true; btn.textContent = 'Seeding…';
  const base = document.getElementById('base-url').value.trim();
  const h = {'Content-Type':'application/json'};
  try {
    // 1. Create project
    const pRes = await fetch(base+'/api/projects', { method:'POST', headers:h,
      body: JSON.stringify({name:'Sample PM Project', description:'Auto-seeded by API Tester', status:'active', priority:'high'})
    });
    const proj = await pRes.json();
    if (proj.error) throw new Error(proj.error);
    ENV.pid = proj.id;

    // 2. Create milestone
    const mRes = await fetch(base+`/api/projects/${proj.id}/milestones`, { method:'POST', headers:h,
      body: JSON.stringify({name:'MVP Release', due_date:'2026-06-01', status:'pending'})
    });
    const ms = await mRes.json();
    ENV.mid = ms.id;

    // 3. Create tasks
    const t1Res = await fetch(base+`/api/projects/${proj.id}/tasks`, { method:'POST', headers:h,
      body: JSON.stringify({title:'Set up repo', assignee:'Alice', status:'done', priority:'high', milestone_id:ms.id, tags:['setup']})
    });
    const task1 = await t1Res.json();
    ENV.tid = task1.id;

    const t2Res = await fetch(base+`/api/projects/${proj.id}/tasks`, { method:'POST', headers:h,
      body: JSON.stringify({title:'Build API endpoints', assignee:'Bob', status:'in_progress', priority:'high', milestone_id:ms.id, tags:['backend']})
    });
    const task2 = await t2Res.json();

    // 4. Post an update
    const uRes = await fetch(base+`/api/projects/${proj.id}/updates`, { method:'POST', headers:h,
      body: JSON.stringify({content:'Project kicked off — sprint 1 started', update_type:'progress'})
    });
    const upd = await uRes.json();
    ENV.uid = upd.id;

    // 5. Create idea
    const iRes = await fetch(base+'/api/ideas', { method:'POST', headers:h,
      body: JSON.stringify({title:'Add Gantt chart view', description:'Timeline visualization', project_id:proj.id, tags:['feature']})
    });
    const idea = await iRes.json();
    ENV.iid = idea.id;

    // 6. Create board with nodes & edges
    const dRes = await fetch(base+`/api/projects/${proj.id}/boards`, { method:'POST', headers:h,
      body: JSON.stringify({name:'Sprint Flow', type:'process_flow', description:'Sprint workflow'})
    });
    const diagram = await dRes.json();
    ENV.did = diagram.id;

    const n1Res = await fetch(base+`/api/projects/${proj.id}/boards/${diagram.id}/nodes`, { method:'POST', headers:h,
      body: JSON.stringify({label:'Kickoff', node_type:'start', x:80, y:200, width:160, height:60, meta:{}})
    });
    const node1 = await n1Res.json();
    ENV.nid = node1.id;

    const n2Res = await fetch(base+`/api/projects/${proj.id}/boards/${diagram.id}/nodes`, { method:'POST', headers:h,
      body: JSON.stringify({label:'Development', node_type:'process', x:360, y:200, width:160, height:60, meta:{}})
    });
    const node2 = await n2Res.json();
    ENV.nid2 = node2.id;

    const eRes = await fetch(base+`/api/projects/${proj.id}/boards/${diagram.id}/edges`, { method:'POST', headers:h,
      body: JSON.stringify({source_id:node1.id, target_id:node2.id, label:'next', edge_type:'default'})
    });
    const edge = await eRes.json();
    ENV.eid = edge.id;

    renderVarBar();
    toast(`Seeded! pid=${proj.id} tid=${task1.id} mid=${ms.id} did=${diagram.id}`, 'ok');
  } catch(e) {
    toast('Seed failed: ' + e.message, 'err');
  }
  btn.disabled = false;
  btn.innerHTML = '<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M5 0v10M0 5h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg> Seed Data';
}

// ── Collection ────────────────────────────────────────────────────────────────
function renderCollection(filter = '') {
  const q = filter.toLowerCase();
  const list = document.getElementById('col-list');
  let total = 0;
  list.innerHTML = ENDPOINTS.map((grp, gi) => {
    const items = grp.items.filter(ep =>
      !q || ep.name.toLowerCase().includes(q) || ep.path.toLowerCase().includes(q) || ep.method.toLowerCase().includes(q)
    );
    if (!items.length) return '';
    total += items.length;
    return `
      <div class="col-group">
        <div class="col-group-header" onclick="toggleGroup(this)">
          <span style="color:${grp.color}">●</span>${grp.group}
          <span class="arr">▾</span>
        </div>
        <div class="col-items">
          ${items.map(ep => {
            const idx = ENDPOINTS[gi].items.indexOf(ep);
            const uid = `${gi}-${idx}`;
            return `
              <div class="col-item" id="ep-${uid}" onclick="loadEndpoint(${gi},${idx})">
                <span class="method-tag m-${ep.method}">${ep.method}</span>
                <div style="flex:1;min-width:0">
                  <div class="col-item-name">${ep.name}</div>
                  <div class="col-item-path">${ep.path}</div>
                </div>
              </div>`;
          }).join('')}
        </div>
      </div>`;
  }).join('');
  document.getElementById('ep-count').textContent = `${total} endpoints`;
}

function filterEndpoints(q) { renderCollection(q) }
function toggleGroup(h) { h.classList.toggle('closed'); h.nextElementSibling.classList.toggle('hidden') }

function loadEndpoint(gi, idx) {
  const ep = ENDPOINTS[gi].items[idx];
  document.getElementById('method-select').value = ep.method;
  const base = document.getElementById('base-url').value.trim();
  // Resolve variables in path
  document.getElementById('url-input').value = base + resolveVars(ep.path);
  if (ep.body) {
    // Resolve variables in body JSON too
    let bodyStr = JSON.stringify(ep.body, null, 2);
    bodyStr = resolveVars(bodyStr);
    // Convert string "123" back to number 123 for integer fields
    bodyStr = bodyStr.replace(/"(\d+)"/g, (m, d) => {
      // Only convert for known integer fields
      return d;
    });
    document.getElementById('body-editor').value = bodyStr;
    document.getElementById('body-section').style.display = '';
  } else {
    document.getElementById('body-editor').value = '';
    document.getElementById('body-section').style.display = hasBody(ep.method) ? '' : 'none';
  }
  onMethodChange();
  // highlight active
  document.querySelectorAll('.col-item').forEach(el => el.classList.remove('active'));
  document.getElementById(`ep-${gi}-${idx}`)?.classList.add('active');
}

async function sendRequest() {
  const base   = document.getElementById('base-url').value.trim();
  let   urlVal = document.getElementById('url-input').value.trim();
  const method = document.getElementById('method-select').value;
  const bodyRaw = document.getElementById('body-editor').value.trim();
  const btn    = document.getElementById('send-btn');

  // Resolve any remaining {{var}} in URL
  urlVal = resolveVars(urlVal);

  // Build full URL
  const url = urlVal.startsWith('http') ? urlVal : base + (urlVal.startsWith('/') ? urlVal : '/' + urlVal);

  // Warn if unresolved variables remain
  if (/\{\{\w+\}\}/.test(url)) {
    toast('URL has unresolved variables — click Seed Data first', 'err');
    return;
  }

  btn.textContent = 'Sending…'; btn.disabled = true; btn.classList.add('loading');

  const opts = {
    method,
    headers: { 'Accept': 'application/json' },
  };

  if (hasBody(method) && bodyRaw) {
    // Resolve vars in body too
    let resolvedBody = resolveVars(bodyRaw);
    try { JSON.parse(resolvedBody) } catch { toast('Invalid JSON body', 'err'); resetBtn(); return }
    opts.headers['Content-Type'] = 'application/json';
    opts.body = resolvedBody;
  }

  const t0 = performance.now();
  let status, statusText, data, hdrs = {};

  try {
    const res = await fetch(url, opts);
    const elapsed = Math.round(performance.now() - t0);
    status = res.status; statusText = res.statusText;
    res.headers.forEach((v,k) => hdrs[k] = v);
    resHeaders = hdrs;
    const text = await res.text();
    resRaw = text;
    try { data = JSON.parse(text) } catch { data = text }

    // Auto-capture IDs from successful responses
    if (status < 400 && typeof data === 'object') {
      captureVars(data);
    }

    showResponse(status, statusText, elapsed, data, text, hdrs);
    pushHistory({ method, url, status, elapsed, body: opts.body || null, response: text.slice(0, 2000) });
  } catch (err) {
    showError(err.message);
  }

  resetBtn();
}

function resetBtn() {
  const btn = document.getElementById('send-btn');
  btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 1l10 5-10 5V7l7-1-7-1V1z" fill="currentColor"/></svg> Send';
  btn.disabled = false; btn.classList.remove('loading');
}

// ── Response rendering ────────────────────────────────────────────────────────
function showResponse(status, statusText, elapsed, data, raw, hdrs) {
  const cls = status < 300 ? '2xx' : status < 400 ? '3xx' : status < 500 ? '4xx' : '5xx';
  document.getElementById('res-status').innerHTML = `<span class="status-badge status-${cls}">${status} ${statusText}</span>`;
  document.getElementById('res-time').textContent = `${elapsed}ms`;
  const size = new Blob([raw]).size;
  document.getElementById('res-size').textContent = size > 1024 ? `${(size/1024).toFixed(1)} KB` : `${size} B`;
  document.getElementById('copy-btn').style.display = '';

  if (activeResTab === 'body') renderBody(data, raw);
  else renderHdrs(hdrs);
}

function showError(msg) {
  document.getElementById('res-status').innerHTML = `<span class="status-badge status-5xx">Error</span>`;
  document.getElementById('res-time').textContent = '';
  document.getElementById('res-size').textContent = '';
  document.getElementById('res-body').innerHTML = `<div style="color:var(--rose);font-family:var(--mono);font-size:12px;padding:4px">${esc(msg)}<br><br><span style="color:var(--text-dim)">Is the server running at ${esc(document.getElementById('base-url').value)}?<br>Try: ./start.sh --bg</span></div>`;
}

function renderBody(data, raw) {
  const el = document.getElementById('res-body');
  if (typeof data === 'object') {
    el.innerHTML = `<pre style="white-space:pre-wrap;word-break:break-all">${syntaxHL(data)}</pre>`;
  } else {
    el.innerHTML = `<pre style="white-space:pre-wrap;word-break:break-all;color:var(--text-mid)">${esc(raw)}</pre>`;
  }
}

function renderHdrs(hdrs) {
  const rows = Object.entries(hdrs).map(([k,v]) =>
    `<tr><td>${esc(k)}</td><td>${esc(v)}</td></tr>`
  ).join('');
  document.getElementById('res-body').innerHTML = `
    <table class="headers-table">
      <thead><tr><th>Header</th><th>Value</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function switchResTab(tab) {
  activeResTab = tab;
  document.getElementById('tab-body').classList.toggle('active', tab==='body');
  document.getElementById('tab-headers').classList.toggle('active', tab==='headers');
  if (tab === 'body') { try { renderBody(JSON.parse(resRaw), resRaw) } catch { renderBody(resRaw, resRaw) } }
  else renderHdrs(resHeaders);
}

function copyResponse() {
  navigator.clipboard.writeText(resRaw).then(()=>toast('Copied ✓','ok'));
}

// ── JSON syntax highlight ─────────────────────────────────────────────────────
function syntaxHL(obj) {
  const raw = JSON.stringify(obj, null, 2);
  return raw.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, match => {
    if (/^"/.test(match)) {
      if (/:$/.test(match)) return `<span class="j-key">${esc(match)}</span>`;
      return `<span class="j-str">${esc(match)}</span>`;
    }
    if (/true|false/.test(match)) return `<span class="j-bool">${match}</span>`;
    if (/null/.test(match)) return `<span class="j-null">${match}</span>`;
    return `<span class="j-num">${match}</span>`;
  });
}

// ── History ───────────────────────────────────────────────────────────────────
function pushHistory(entry) {
  history.unshift({ ...entry, ts: Date.now() });
  if (history.length > 100) history = history.slice(0, 100);
  localStorage.setItem('fc-history', JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  document.getElementById('hist-count').textContent = history.length;
  const list = document.getElementById('history-list');
  if (!history.length) {
    list.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text-dim);font-size:11px">No requests yet</div>`;
    return;
  }
  list.innerHTML = history.map((h,i) => {
    const cls = h.status < 300 ? 'status-2xx' : h.status < 400 ? 'status-3xx' : h.status < 500 ? 'status-4xx' : 'status-5xx';
    const ago = timeAgo(h.ts);
    const path = h.url.replace(/^https?:\/\/[^\/]+/, '');
    return `
      <div class="hist-item" onclick="loadFromHistory(${i})">
        <span class="method-tag m-${h.method}" style="flex-shrink:0">${h.method}</span>
        <div class="hist-body">
          <div class="hist-path">${esc(path)}</div>
          <div class="hist-meta">${ago} · ${h.elapsed}ms</div>
        </div>
        <span class="hist-status status-badge ${cls}">${h.status||'err'}</span>
      </div>`;
  }).join('');
}

function loadFromHistory(i) {
  const h = history[i];
  const base = document.getElementById('base-url').value.trim();
  const path = h.url.replace(/^https?:\/\/[^\/]+/, '');
  document.getElementById('method-select').value = h.method;
  document.getElementById('url-input').value = base + path;
  if (h.body) {
    document.getElementById('body-editor').value = JSON.stringify(JSON.parse(h.body), null, 2);
    document.getElementById('body-section').style.display = '';
  } else {
    document.getElementById('body-section').style.display = hasBody(h.method) ? '' : 'none';
  }
  onMethodChange();
  toggleHistory();
}

function clearHistory() {
  history = []; localStorage.removeItem('fc-history'); renderHistory();
  toast('History cleared');
}

function toggleHistory() {
  histOpen = !histOpen;
  document.getElementById('history-drawer').classList.toggle('open', histOpen);
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

function timeAgo(ts) {
  const s = Math.floor((Date.now()-ts)/1000);
  if (s < 60) return `${s}s ago`;
  if (s < 3600) return `${Math.floor(s/60)}m ago`;
  return `${Math.floor(s/3600)}h ago`;
}

let _tt;
function toast(msg, kind='') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'show' + (kind?' '+kind:'');
  clearTimeout(_tt); _tt = setTimeout(()=>{ el.className='' }, 2200);
}

// keyboard shortcuts
document.addEventListener('keydown', ev => {
  if ((ev.ctrlKey||ev.metaKey) && ev.key==='Enter') { ev.preventDefault(); sendRequest() }
  if ((ev.ctrlKey||ev.metaKey) && ev.key==='k') { ev.preventDefault(); document.getElementById('ep-search').focus() }
  if (ev.key==='Escape' && histOpen) toggleHistory();
});

boot();

</script>
