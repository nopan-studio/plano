<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plano</title>
<link rel="icon" type="image/png" href="/static/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/index.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
</head>
<body>
<div id="mcp-status-container"></div>
<div id="app">

<!-- Topbar -->
<div id="topbar">
  <a id="back-btn" href="/dashboard" title="Back to Dashboard" class="tb-icon-btn" style="text-decoration:none;flex-shrink:0">
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M8 2L4 6l4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </a>
  <div class="tb-sep"></div>
  <img src="/static/logo.png" alt="Plano" style="height:22px;vertical-align:middle;flex-shrink:0"/>
  <div class="tb-sep"></div>
  <input id="wf-name" type="text" value="Untitled Board" placeholder="Board name…">
  <span id="type-pill" class="type-pill process_flow">● Process Flow</span>
  <div class="tb-right">
    <button class="btn btn-ghost" onclick="showApiModal()">
      <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M9 1L6 5.5l3 4.5M2 1l3 4.5L2 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      API
    </button>
    <button class="btn btn-ghost" onclick="autoLayoutNodes()" title="Auto-layout diagram">
      <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M1 1h3v3H1zM7 1h3v3H7zM1 7h3v3H1zM7 7h3v3H7z" stroke="currentColor" stroke-width="1.2"/><path d="M4 2.5h3M4 8.5h3M2.5 4v3M8.5 4v3" stroke="currentColor" stroke-width="1.2"/></svg>
      Layout
    </button>
    <button class="btn btn-ghost" onclick="fitView()">⊞ Fit</button>
    <button class="btn btn-accent" onclick="saveDiagram()">
      <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M9 9H2a1 1 0 01-1-1V3L3 1h6a1 1 0 011 1v6a1 1 0 01-1 1z" stroke="currentColor" stroke-width="1.4"/><path d="M3 9V6.5h5V9M6 1v3H4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      Save
    </button>
  </div>
</div>

<!-- Workspace -->
<div id="workspace">

  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sb-tabs">
      <div class="sb-tab active" id="t-nodes" onclick="sbTab('nodes')">Nodes</div>
      <div class="sb-tab" id="t-wf" onclick="sbTab('wf')">Boards</div>
    </div>

    <!-- Nodes pane -->
    <div class="sb-pane active" id="p-nodes">
      <div class="sb-search-row">
        <div class="sb-search-inner">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="5" cy="5" r="3.5" stroke="currentColor" stroke-width="1.4"/><path d="M8 8l2.5 2.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
          <input class="sb-input" id="node-q" placeholder="Search nodes…" oninput="renderPalette(this.value)">
        </div>
      </div>
      <div class="sb-scroll" id="palette"></div>
    </div>

    <!-- Workflows pane -->
    <div class="sb-pane" id="p-wf">
      <div class="sb-new" onclick="showNewModal()">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        New Board
      </div>
      <div class="sb-scroll" id="wf-list"></div>
    </div>
  </div>

  <!-- Canvas -->
  <div id="canvas-wrap">
    <div id="canvas">
      <svg id="svg-layer">
        <defs>
          <marker id="m-def" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#484848"/></marker>
          <marker id="m-acc" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#FF6D5A"/></marker>
          <marker id="m-grn" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#56c464"/></marker>
          <marker id="m-pur" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#9b7fe8"/></marker>
        </defs>
      </svg>
      <!-- Connection preview -->
      <svg id="conn-svg" style="position:absolute;top:0;left:0;width:5000px;height:5000px;pointer-events:none">
        <path id="conn-line" fill="none" stroke="var(--accent)" stroke-width="2" stroke-dasharray="6,4" d="" visibility="hidden"/>
      </svg>
    </div>
    <div id="empty-hint">
      <div class="big">◈</div>
      <p>Drag nodes from the sidebar<br>or double-click a palette item</p>
    </div>
    <div id="zoom-bar">
      <button class="zb" onclick="zoom(-0.1)">−</button>
      <span id="zoom-val">100%</span>
      <button class="zb" onclick="zoom(0.1)">+</button>
      <button class="zb" onclick="fitView()" style="font-size:11px">⊕</button>
    </div>
  </div>

  <!-- Props panel -->
  <div id="props">
    <div class="props-head">
      <div class="props-node-icon" id="pi"></div>
      <h3 id="pt">Properties</h3>
      <button class="props-x" onclick="closeProps()">×</button>
    </div>
    <div class="props-body" id="pb"></div>
  </div>
</div>
</div>

<!-- New workflow modal -->
<div class="overlay" id="new-modal" style="display:none">
  <div class="modal">
    <div class="modal-title">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="7.5" cy="7.5" r="6" stroke="var(--accent)" stroke-width="1.6"/><path d="M7.5 4.5v6M4.5 7.5h6" stroke="var(--accent)" stroke-width="1.6" stroke-linecap="round"/></svg>
      New Board
    </div>
    <div class="pg"><div class="plabel">Name</div><input class="pinput" id="nm-n" placeholder="My Board"></div>
    <div class="pg">
      <div class="plabel">Type</div>
      <select class="pselect" id="nm-t">
        <option value="process_flow">⬡ Process Flow</option>
        <option value="flowchart">◇ Flowchart</option>
        <option value="db_diagram">⊞ DB Diagram</option>
        <option value="idea_map">◉ Idea Map</option>
        <option value="function_flow">ƒ Function Flow</option>
      </select>
    </div>
    <div class="pg"><div class="plabel">Description</div><input class="pinput" id="nm-d" placeholder="Optional"></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal('new-modal')">Cancel</button>
      <button class="btn btn-accent" onclick="createWorkflow()">Create</button>
    </div>
  </div>
</div>

<!-- API modal -->
<div class="overlay" id="api-modal" style="display:none">
  <div class="modal wide">
    <div class="modal-title">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M11 2l3 5.5-3 5M4 12L1 6.5 4 1" stroke="var(--accent)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      REST API Reference
    </div>
    <div id="api-content" style="max-height:420px;overflow-y:auto"></div>
    <div class="modal-foot"><button class="btn btn-ghost" onclick="closeModal('api-modal')">Close</button></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ══ Catalogue ════════════════════════════════════════════════════════════════
const CAT = {
  process_flow: [
    { cat:'Flow Steps', col:'var(--green)', nodes:[
      {t:'start',      n:'Start',        s:'Entry point',       i:'▶', c:'var(--green)',   b:'var(--green-dim)'},
      {t:'process',    n:'Step',         s:'Process / action',  i:'⬡', c:'var(--blue)',    b:'var(--blue-dim)'},
      {t:'decision',   n:'Decision',     s:'Branch condition',  i:'◇', c:'var(--amber)',   b:'var(--amber-dim)'},
      {t:'subprocess', n:'Sub-process',  s:'Nested flow',       i:'⧉', c:'var(--purple)',  b:'var(--purple-dim)'},
      {t:'delay',      n:'Delay',        s:'Wait / timer',      i:'⏱', c:'var(--teal)',    b:'var(--teal-dim)'},
      {t:'manual',     n:'Manual Step',  s:'Human action',      i:'✋', c:'var(--text-mid)',b:'var(--surface)'},
    ]},
    { cat:'Data', col:'var(--teal)', nodes:[
      {t:'datastore',  n:'Data Store',   s:'Database / storage',i:'🗄', c:'var(--teal)',    b:'var(--teal-dim)'},
      {t:'document',   n:'Document',     s:'File / report',     i:'📄', c:'var(--blue)',    b:'var(--blue-dim)'},
      {t:'io',         n:'I / O',        s:'Input or output',   i:'⇌', c:'var(--teal)',    b:'var(--teal-dim)'},
    ]},
    { cat:'Utils', col:'var(--text-dim)', nodes:[
      {t:'end',        n:'End',          s:'Exit point',        i:'⬛', c:'var(--rose)',    b:'var(--rose-dim)'},
      {t:'annotation', n:'Note',         s:'Annotation',        i:'✎', c:'var(--amber)',   b:'var(--amber-dim)'},
      {t:'connector',  n:'Connector',    s:'Off-page link',     i:'◎', c:'var(--text-mid)',b:'var(--surface)'},
    ]},
  ],
  flowchart: [
    { cat:'Shapes', col:'var(--blue)', nodes:[
      {t:'start',      n:'Start / End',  s:'Rounded terminal',  i:'◯', c:'var(--green)',   b:'var(--green-dim)'},
      {t:'process',    n:'Process',      s:'Rectangle step',    i:'▭', c:'var(--blue)',    b:'var(--blue-dim)'},
      {t:'decision',   n:'Decision',     s:'Diamond branch',    i:'◇', c:'var(--amber)',   b:'var(--amber-dim)'},
      {t:'predefined', n:'Predefined',   s:'Sub-routine',       i:'⊟', c:'var(--purple)',  b:'var(--purple-dim)'},
      {t:'subprocess', n:'Sub-flow',     s:'Nested chart',      i:'⧉', c:'var(--teal)',    b:'var(--teal-dim)'},
      {t:'io',         n:'I / O',        s:'Parallelogram',     i:'⇌', c:'var(--teal)',    b:'var(--teal-dim)'},
    ]},
    { cat:'Utils', col:'var(--text-dim)', nodes:[
      {t:'annotation', n:'Note',         s:'Annotation',        i:'✎', c:'var(--amber)',   b:'var(--amber-dim)'},
      {t:'connector',  n:'Connector',    s:'Off-page ref',      i:'◎', c:'var(--text-mid)',b:'var(--surface)'},
    ]},
  ],
  db_diagram: [
      { cat:'Schema', col:'var(--purple)', nodes:[
        {t:'db_table',   n:'Table',        s:'Database table',    i:'⊞', c:'var(--purple)',  b:'var(--purple-dim)'},
        {t:'enum',       n:'Enum',         s:'Enumeration',       i:'≡', c:'var(--amber)',   b:'var(--amber-dim)'},
        {t:'external_table', n:'External Ref', s:'Table from other board', i:'📤', c:'var(--rose)', b:'var(--rose-dim)'},
      ]},
    { cat:'Utils', col:'var(--text-dim)', nodes:[
      {t:'note',       n:'Note',         s:'Schema note',       i:'✎', c:'var(--amber)',   b:'var(--amber-dim)'},
    ]},
  ],
  idea_map: [
    { cat:'Ideas', col:'var(--amber)', nodes:[
      {t:'central',    n:'Central Topic', s:'Core idea',         i:'◉', c:'var(--acc)',     b:'var(--accent-dim)'},
      {t:'branch',     n:'Main Branch',   s:'Primary category',  i:'◆', c:'var(--amber)',   b:'var(--amber-dim)'},
      {t:'subbranch',  n:'Sub-branch',    s:'Detail / sub-topic',i:'◇', c:'var(--blue)',    b:'var(--blue-dim)'},
      {t:'idea',       n:'Idea',          s:'Leaf idea node',    i:'💡', c:'var(--green)',   b:'var(--green-dim)'},
      {t:'resource',   n:'Resource',      s:'Link / reference',  i:'🔗', c:'var(--teal)',    b:'var(--teal-dim)'},
    ]},
    { cat:'Utils', col:'var(--text-dim)', nodes:[
      {t:'annotation', n:'Note',          s:'Free-text note',    i:'✎', c:'var(--amber)',   b:'var(--amber-dim)'},
    ]},
  ],
  function_flow: [
    { cat:'Code', col:'var(--purple)', nodes:[
      {t:'module',     n:'Module',        s:'File / package',    i:'📦', c:'var(--purple)',  b:'var(--purple-dim)'},
      {t:'process',    n:'Function',      s:'Named function',    i:'ƒ',  c:'var(--blue)',    b:'var(--blue-dim)'},
      {t:'method',     n:'Method',        s:'Class method',      i:'⊕', c:'var(--teal)',    b:'var(--teal-dim)'},
      {t:'start',      n:'Trigger',       s:'Event / entry',     i:'▶', c:'var(--green)',   b:'var(--green-dim)'},
      {t:'end',        n:'Return',        s:'Return / exit',     i:'↩', c:'var(--rose)',    b:'var(--rose-dim)'},
    ]},
    { cat:'Data', col:'var(--teal)', nodes:[
      {t:'io',         n:'Input Param',   s:'Function argument', i:'→', c:'var(--teal)',    b:'var(--teal-dim)'},
      {t:'datastore',  n:'Output',        s:'Return value',      i:'←', c:'var(--green)',   b:'var(--green-dim)'},
      {t:'decision',   n:'Side Effect',   s:'Mutation / I/O',    i:'⚡', c:'var(--amber)',   b:'var(--amber-dim)'},
    ]},
    { cat:'Utils', col:'var(--text-dim)', nodes:[
      {t:'annotation', n:'Note',          s:'Code comment',      i:'✎', c:'var(--amber)',   b:'var(--amber-dim)'},
    ]},
  ],
};
const TYPE_LABELS = {
  process_flow:'Process Flow', flowchart:'Flowchart', db_diagram:'DB Diagram',
  idea_map:'Idea Map', function_flow:'Function Flow'
};
const TYPE_ICONS = {
  process_flow:'⬡', flowchart:'◇', db_diagram:'⊞', idea_map:'◉', function_flow:'ƒ'
};
function getCat() { return CAT[S.cur?.type]||CAT.process_flow }
function getDef(type) { for(const g of getCat()) { const d=g.nodes.find(x=>x.t===type); if(d) return d } return {t:type,n:type,i:'◈',c:'var(--text-dim)',b:'var(--surface)'} }

// ══ State ════════════════════════════════════════════════════════════════════
const S = { diagrams:[], cur:null, selN:null, selE:null, scale:1, ox:0, oy:0, drag:null, conn:null, pan:false, panO:null };

// ══ API ══════════════════════════════════════════════════════════════════════
const api = {
  g:p=>fetch(p).then(r=>r.json()),
  p:(p,b)=>fetch(p,{method:'POST', headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}).then(r=>r.json()),
  u:(p,b)=>fetch(p,{method:'PUT',  headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}).then(r=>r.json()),
  h:(p,b)=>fetch(p,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}).then(r=>r.json()),
  d:p=>fetch(p,{method:'DELETE'}).then(r=>r.json()),
};

// ══ Init ═════════════════════════════════════════════════════════════════════
async function init() {
  // Resolve project context from URL path /project/:pid/editor/:did
  let pidFromUrl = null;
  let didFromUrl = null;
  const pathParts = window.location.pathname.match(/\/project\/(\d+)\/editor(?:\/(\d+))?/);
  if (pathParts) {
    pidFromUrl = pathParts[1];
    if (pathParts[2]) didFromUrl = pathParts[2];
  }
  
  let returnHash = '#/';
  try {
    const stored = JSON.parse(localStorage.getItem('fmc_editor_return') || 'null');
    if (stored && (pidFromUrl ? stored.pid == pidFromUrl : true)) {
      returnHash = stored.hash || '#/';
    } else if (pidFromUrl) {
      returnHash = `#/projects/${pidFromUrl}/boards`;
    }
  } catch {}
  // Update back button
  const backBtn = document.getElementById('back-btn');
  if (backBtn) backBtn.href = '/dashboard' + returnHash;

  const activePid = pidFromUrl || (()=>{ try { return JSON.parse(localStorage.getItem('fmc_active_project'))?.id; } catch {} })();
  window._activePid = activePid ? +activePid : null;
  
  if (!window._activePid) {
    alert("Editor requires a valid project context.");
    window.location.href = '/dashboard';
    return;
  }

  S.diagrams = await api.g(`/api/projects/${window._activePid}/boards`);

  // Override createWorkflow to attach project_id
  window._activePid = activePid ? +activePid : null;

  renderWfList(); renderPalette(); setupCanvas();

  if (didFromUrl) {
    await openWf(+didFromUrl);
  } else if (S.diagrams.length) {
    await openWf(S.diagrams[0].id);
  } else {
    const projectBody = {name:'My Board', type:'process_flow', description:''};
    const d = await api.p(`/api/projects/${window._activePid}/boards`, projectBody);
    S.diagrams = await api.g(`/api/projects/${window._activePid}/boards`);
    await openWf(d.id);
  }
}

// ══ Sidebar ══════════════════════════════════════════════════════════════════
function sbTab(t) {
  ['nodes','wf'].forEach(k=>{
    document.getElementById('t-'+k).classList.toggle('active',k===t);
    document.getElementById('p-'+k).classList.toggle('active',k===t);
  });
}

function renderPalette(q='') {
  const lq=q.toLowerCase();
  document.getElementById('palette').innerHTML = getCat().map(g=>{
    const items=g.nodes.filter(n=>!lq||n.n.toLowerCase().includes(lq)||n.s.toLowerCase().includes(lq));
    if(!items.length) return '';
    return `
      <div>
        <div class="sb-cat-header" onclick="toggleCat(this)">
          <span style="color:${g.col}">●</span>${g.cat}<span class="arr">▾</span>
        </div>
        <div class="sb-cat-items">
          ${items.map(n=>`
            <div class="npi" draggable="true" ondragstart="pdrag(event,'${n.t}')" ondblclick="addNodeMid('${n.t}')">
              <div class="npi-icon" style="background:${n.b};color:${n.c}">${n.i}</div>
              <div><div class="npi-label">${n.n}</div><div class="npi-sub">${n.s}</div></div>
            </div>`).join('')}
        </div>
      </div>`;
  }).join('');
}

function toggleCat(h) { h.classList.toggle('closed'); h.nextElementSibling.classList.toggle('hidden') }

function renderWfList() {
  document.getElementById('wf-list').innerHTML = S.diagrams.map(d=>`
    <div class="di ${S.cur?.id===d.id?'active':''}" onclick="openWf(${d.id})">
      <div class="di-ico pf">${TYPE_ICONS[d.type]||'⬡'}</div>
      <div class="di-body">
        <div class="di-name">${esc(d.name)}</div>
        <div class="di-type">${TYPE_LABELS[d.type]||d.type}</div>
        <div class="di-stats"><span class="di-stat">${d.node_count} nodes</span><span class="di-stat">${d.edge_count} edges</span></div>
      </div>
      <div class="di-actions">
        <button class="di-act" title="Duplicate" onclick="ev=arguments[0];ev.stopPropagation();duplicateWf(${d.id})">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2.5 4.5h5v5h-5v-5zM4.5 2.5h5v5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="di-act del" title="Delete" onclick="ev=arguments[0];ev.stopPropagation();deleteWf(${d.id})">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2.5 3.5h7M4 3.5V2.5a1 1 0 011-1h2a1 1 0 011 1v1M4 5.5v3.5M6 5.5v3.5M8 5.5v3.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>`).join('');
}

// ══ Open / Create ═════════════════════════════════════════════════════════════
async function openWf(id) {
  S.cur=await api.g(`/api/projects/${window._activePid}/boards/${id}`);
  S.selN=null; S.selE=null;
  document.getElementById('wf-name').value=S.cur.name;
  const pill=document.getElementById('type-pill');
  pill.className=`type-pill ${S.cur.type}`;
  pill.textContent=`● ${TYPE_LABELS[S.cur.type]||S.cur.type}`;
  renderPalette(); renderWfList(); renderCanvas(); closeProps();
  emptyHint(!S.cur.nodes.length);
}

function showNewModal() { document.getElementById('nm-n').value=''; document.getElementById('nm-d').value=''; document.getElementById('new-modal').style.display='flex' }
function closeModal(id) { document.getElementById(id).style.display='none' }

async function createWorkflow() {
  const name=document.getElementById('nm-n').value.trim()||'New Board';
  const type=document.getElementById('nm-t').value;
  const desc=document.getElementById('nm-d').value;
  const body = {name, type, description:desc};
  const d=await api.p(`/api/projects/${window._activePid}/boards`, body);
  S.diagrams=await api.g(`/api/projects/${window._activePid}/boards`);
  closeModal('new-modal'); await openWf(d.id); toast('Board created','ok');
}

async function saveDiagram() {
  if(!S.cur) return;
  const name=document.getElementById('wf-name').value.trim()||S.cur.name;
  await api.h(`/api/projects/${window._activePid}/boards/${S.cur.id}`,{name});
  S.cur.name=name; S.diagrams=await api.g(`/api/projects/${window._activePid}/boards`); renderWfList(); toast('Saved ✓','ok');
}

async function deleteWf(id) {
  if(!confirm('Delete this board permanently?')) return;
  await api.d(`/api/projects/${window._activePid}/boards/${id}`);
  S.diagrams = await api.g(`/api/projects/${window._activePid}/boards`);
  if(S.cur?.id === id) {
    if(S.diagrams.length) await openWf(S.diagrams[0].id);
    else { S.cur = null; renderCanvas(); renderPalette(); document.getElementById('wf-name').value='No Board'; }
  }
  renderWfList(); toast('Board deleted');
}

async function duplicateWf(id) {
  const d = await api.p(`/api/projects/${window._activePid}/boards/${id}/duplicate`, {});
  S.diagrams = await api.g(`/api/projects/${window._activePid}/boards`);
  renderWfList();
  await openWf(d.id);
  toast('Board duplicated','ok');
}

// ══ Canvas render ════════════════════════════════════════════════════════════
function renderCanvas() {
  document.getElementById('canvas').querySelectorAll('.n8n-node').forEach(n=>n.remove());
  document.getElementById('svg-layer').querySelectorAll('.eg').forEach(e=>e.remove());
  if(!S.cur) return;
  S.cur.nodes.forEach(makeNode);
  S.cur.edges.forEach(makeEdge);
}

function makeNode(n) {
  const def=getDef(n.node_type);
  const isNote=n.node_type==='annotation'||n.node_type==='note';
  const isTab=n.node_type==='db_table';
  const el=document.createElement('div');
  el.className='n8n-node'+(isNote?' is-note':''); el.id=`n-${n.id}`; el.dataset.id=n.id;
  el.style.left=n.x+'px'; el.style.top=n.y+'px'; el.style.width=(n.width||220)+'px';
  el.innerHTML=nodeHTML(n,def,isNote,isTab);
  
  // Header ports
  for(const s of['l','r','t','b']){
    const p=document.createElement('div');
    p.className=`port port-${s}`; p.dataset.s=s; p.dataset.ni=n.id;
    p.addEventListener('mousedown',portDown); el.appendChild(p);
  }
  
  // Column ports
  if(isTab){
    const rows = el.querySelectorAll('.ncol');
    rows.forEach((row, i) => {
      ['l', 'r'].forEach(s => {
        const p = document.createElement('div');
        p.className = `port-row ${s}`;
        p.dataset.s = s; p.dataset.ni = n.id; p.dataset.ci = i; // Column index
        p.addEventListener('mousedown', portDown);
        row.appendChild(p);
      });
    });
  }

  el.addEventListener('mousedown',nodeDown);
  el.addEventListener('click',ev=>{ if(!S.drag?.moved){ev.stopPropagation();selNode(n.id)} });
  document.getElementById('canvas').appendChild(el);
}

function nodeHTML(n,def,isNote,isTab) {
  const cols=n.meta?.columns||[];
  const subtitles={start:'Trigger',end:'End',process:'Action',decision:'Decision',io:'I / O',connector:'Connector',annotation:'Note',db_table:'Table',enum:'Enum',note:'Note',external_table:'External Table'};
  if(isNote) return `
    <div class="note-header" style="background:transparent">
      <span style="color:${def.c}">${def.i}</span>
      <span class="node-title">${esc(n.label)}</span>
    </div>
    <div class="note-body">${esc(n.meta?.description||'Click to add note…')}</div>`;
  return `
    <div class="node-row">
      <div class="node-icon-cell" style="background:${def.b};color:${def.c}">${def.i}</div>
      <div class="node-text-cell">
        <div class="node-title">${esc(n.label)}</div>
        <div class="node-subtitle">${subtitles[n.node_type]||n.node_type}</div>
      </div>
      ${n.node_type==='external_table'&&n.meta?.ref_diagram_id?`
      <div style="display:flex;align-items:center;padding-right:10px" title="Jump to Board" onclick="ev=arguments[0];ev.stopPropagation();openWf(${n.meta.ref_diagram_id})">
        <div style="width:24px;height:24px;border-radius:4px;background:var(--rose-dim);color:var(--rose);display:flex;align-items:center;justify-content:center;cursor:pointer">➔</div>
      </div>`:''}

      <div class="ncol" data-name="${esc(c.name||'')}">
        <div class="port-row l" data-s="l" data-ni="${n.id}" data-col="${i}"></div>
        ${c.pk?`<span class="badge badge-pk" title="Primary Key">PK</span>`:''}
        ${c.fk?`<span class="badge badge-fk" title="Foreign Key">FK</span>`:''}
        <span class="col-n">${esc(c.name||'')}</span>
        <span class="col-t">${esc(c.type||'')}</span>
        <div class="port-row r" data-s="r" data-ni="${n.id}" data-col="${i}"></div>
      </div>`).join('')}</div>`:''}`;
}

function refreshNode(n) {
  const el=document.getElementById(`n-${n.id}`); if(!el) return;
  const def=getDef(n.node_type);
  const isNote=n.node_type==='annotation'||n.node_type==='note';
  const isTab=n.node_type==='table'||n.node_type==='view';
  const ports=Array.from(el.querySelectorAll('.port'));
  el.innerHTML=nodeHTML(n,def,isNote,isTab);
  ports.forEach(p=>el.appendChild(p));
}

function makeEdge(e) {
  const svg=document.getElementById('svg-layer');
  const g=document.createElementNS('http://www.w3.org/2000/svg','g');
  g.classList.add('eg'); g.dataset.id=e.id;
  const hit=document.createElementNS('http://www.w3.org/2000/svg','path');
  hit.classList.add('ehit'); hit.addEventListener('click',ev=>{ev.stopPropagation();selEdge(e.id)});
  const p=document.createElementNS('http://www.w3.org/2000/svg','path');
  p.classList.add('epath',`et-${e.edge_type}`); if(S.selE===e.id) p.classList.add('sel');
  p.setAttribute('marker-end',eMark(e.edge_type,S.selE===e.id));
  p.addEventListener('click',ev=>{ev.stopPropagation();selEdge(e.id)});
  const lbl=document.createElementNS('http://www.w3.org/2000/svg','text');
  lbl.classList.add('elabel');
  g.appendChild(hit); g.appendChild(p); g.appendChild(lbl);
  svg.appendChild(g); posEdge(e);
}

function eMark(type,sel) {
  if(sel) return 'url(#m-acc)';
  if(type==='success') return 'url(#m-grn)';
  if(type==='one_to_many'||type==='many_to_many') return 'url(#m-pur)';
  return 'url(#m-def)';
}

function posEdge(e) {
  const g=document.querySelector(`.eg[data-id="${e.id}"]`); if(!g) return;
  const se=document.getElementById(`n-${e.source_id}`), te=document.getElementById(`n-${e.target_id}`);
  if(!se||!te) return;
  
  const sc = getPortCoords(se, e.meta?.source_port, e.meta?.source_column);
  const tc = getPortCoords(te, e.meta?.target_port, e.meta?.target_column);
  
  const ctrl=Math.max(Math.abs(tc.x-sc.x)*0.5,80);
  const d=`M ${sc.x} ${sc.y} C ${sc.x+ctrl} ${sc.y},${tc.x-ctrl} ${tc.y},${tc.x} ${tc.y}`;
  g.querySelectorAll('path').forEach(p=>p.setAttribute('d',d));
  const lbl=g.querySelector('text');
  if(lbl){ lbl.setAttribute('x',(sc.x+tc.x)/2); lbl.setAttribute('y',(sc.y+tc.y)/2-7); lbl.setAttribute('text-anchor','middle'); lbl.textContent=e.label||'' }
}

function getPortCoords(el, portMeta, colName) {
  // portMeta format: {side: 'l'|'r', col: index}
  let side = portMeta?.side || (el.style.left < 500 ? 'r' : 'l'); // Default based on position if no meta
  let rowIdx = portMeta?.col;

  // If we have a column name, resolve it to an index
  if (colName) {
    const rows = el.querySelectorAll('.ncol');
    for (let i = 0; i < rows.length; i++) {
        if (rows[i].dataset.name === colName) {
            rowIdx = i;
            break;
        }
    }
  }

  if (rowIdx !== undefined) {
    const rows = el.querySelectorAll('.ncol');
    if (rows[rowIdx]) {
      const row = rows[rowIdx];
      const p = row.querySelector(`.port-row.${side === 'l' ? 'l' : 'r'}`);
      if (p) {
        const r = p.getBoundingClientRect();
        const cr = document.getElementById('canvas').getBoundingClientRect();
        return {
          x: (r.left + r.width/2 - cr.left) / S.scale,
          y: (r.top + r.height/2 - cr.top) / S.scale
        };
      }
    }
  }

  // Fallback to standard side ports
  const p = el.querySelector(`.port-${side}`);
  if (p) {
    const r = p.getBoundingClientRect();
    const cr = document.getElementById('canvas').getBoundingClientRect();
    return {
      x: (r.left + r.width/2 - cr.left) / S.scale,
      y: (r.top + r.height/2 - cr.top) / S.scale
    };
  }

  return nc(el);
}

function nc(el){return{x:parseFloat(el.style.left)+el.offsetWidth/2,y:parseFloat(el.style.top)+el.offsetHeight/2}}
function posAll(){if(S.cur) S.cur.edges.forEach(e=>posEdge(e))}

// ══ Selection ════════════════════════════════════════════════════════════════
function selNode(id) {
  S.selN=id; S.selE=null;
  document.querySelectorAll('.n8n-node').forEach(n=>n.classList.toggle('selected',+n.dataset.id===id));
  document.querySelectorAll('.epath').forEach(p=>{p.classList.remove('sel');p.setAttribute('marker-end',eMark(p.className.baseVal.match(/et-(\S+)/)?.[1]||''))});
  openProps(id,'node');
}
function selEdge(id) {
  S.selE=id; S.selN=null;
  document.querySelectorAll('.n8n-node').forEach(n=>n.classList.remove('selected'));
  document.querySelectorAll('.eg').forEach(g=>{
    const p=g.querySelector('.epath'); const sel=+g.dataset.id===id;
    if(p){p.classList.toggle('sel',sel);p.setAttribute('marker-end',eMark(p.className.baseVal.match(/et-(\S+)/)?.[1]||'',sel))}
  });
  openProps(id,'edge');
}
function deselAll(){S.selN=null;S.selE=null;document.querySelectorAll('.n8n-node').forEach(n=>n.classList.remove('selected'));document.querySelectorAll('.epath').forEach(p=>{p.classList.remove('sel')});closeProps()}

// ══ Canvas interaction ════════════════════════════════════════════════════════
function setupCanvas() {
  const w=document.getElementById('canvas-wrap');
  w.addEventListener('mousedown',ev=>{
    const onBg=ev.target===w||ev.target===document.getElementById('canvas')||ev.target.tagName==='svg'||ev.target.tagName==='SVG';
    if(ev.button===0&&onBg&&!S.drag){deselAll(); S.pan=true; S.panO={x:ev.clientX-S.ox,y:ev.clientY-S.oy}; w.style.cursor='grabbing'; ev.preventDefault()}
    else if(ev.button===1||(ev.button===0&&ev.altKey)){S.pan=true;S.panO={x:ev.clientX-S.ox,y:ev.clientY-S.oy};w.style.cursor='grabbing';ev.preventDefault()}
  });
  w.addEventListener('mousemove',ev=>{
    const r=w.getBoundingClientRect();
    const cx=(ev.clientX-r.left-S.ox)/S.scale, cy=(ev.clientY-r.top-S.oy)/S.scale;
    if(S.pan){S.ox=ev.clientX-S.panO.x;S.oy=ev.clientY-S.panO.y;applyXf();return}
    if(S.drag){const dx=(ev.clientX-S.drag.mx)/S.scale,dy=(ev.clientY-S.drag.my)/S.scale;if(Math.abs(dx)>2||Math.abs(dy)>2)S.drag.moved=true;if(S.drag.moved){S.drag.el.style.left=(S.drag.ox+dx)+'px';S.drag.el.style.top=(S.drag.oy+dy)+'px';posAll()}return}
    if(S.conn){const ln=document.getElementById('conn-line');const nc2=nc(document.getElementById(`n-${S.conn.id}`));const ctrl=Math.max(Math.abs(cx-nc2.x)*0.5,80);ln.setAttribute('d',`M ${nc2.x} ${nc2.y} C ${nc2.x+ctrl} ${nc2.y},${cx-ctrl} ${cy},${cx} ${cy}`);ln.setAttribute('visibility','visible')}
  });
  w.addEventListener('mouseup',async ev=>{
    w.style.cursor='';
    if(S.pan){S.pan=false;return}
    if(S.drag?.moved){const x=parseFloat(S.drag.el.style.left),y=parseFloat(S.drag.el.style.top);await api.h(`/api/projects/${window._activePid}/boards/${S.cur.id}/nodes/${S.drag.id}`,{x,y});const nd=S.cur.nodes.find(n=>n.id===S.drag.id);if(nd){nd.x=x;nd.y=y}}
    S.drag=null;
    if(S.conn){
      document.getElementById('conn-line').setAttribute('visibility', 'hidden');
      const tgtPort = ev.target.closest?.('.port, .port-row');
      const tgtNode = ev.target.closest?.('.n8n-node');
      if(tgtNode && +tgtNode.dataset.id !== S.conn.id) {
        const source_port = { side: S.conn.side, col: S.conn.col };
        const target_port = tgtPort ? { side: tgtPort.dataset.s, col: tgtPort.dataset.ci !== undefined ? +tgtPort.dataset.ci : undefined } : { side: 'l' };
        await addEdge(S.conn.id, +tgtNode.dataset.id, source_port, target_port);
      }
      document.querySelectorAll('.port, .port-row').forEach(p => p.classList.remove('pinned'));
      S.conn = null;
    }
  });
  w.addEventListener('wheel',ev=>{ev.preventDefault();zoom(ev.deltaY>0?-0.08:0.08)},{passive:false});
  // dragover must be prevented on the wrap AND every child so the browser
  // shows the copy cursor and fires 'drop'. Using capture so it catches SVG too.
  w.addEventListener('dragover', ev=>{ ev.preventDefault(); ev.dataTransfer.dropEffect='copy'; }, true);
  w.addEventListener('drop', ev=>{
    ev.preventDefault();
    const t = ev.dataTransfer.getData('nt');
    if (!t) return;
    if (!S.cur) { toast('Create or open a board first','err'); return; }
    const r = w.getBoundingClientRect();
    const x = (ev.clientX - r.left - S.ox) / S.scale;
    const y = (ev.clientY - r.top  - S.oy) / S.scale;
    addNode(t, x, y);
  });
  document.addEventListener('keydown',ev=>{
    if(ev.target.tagName==='INPUT'||ev.target.tagName==='SELECT'||ev.target.tagName==='TEXTAREA') return;
    if(ev.key==='Delete'||ev.key==='Backspace'){if(S.selN)delNode();else if(S.selE)delEdge()}
    if((ev.ctrlKey||ev.metaKey)&&ev.key==='s'){ev.preventDefault();saveDiagram()}
  });
}

function nodeDown(ev){if(ev.target.classList.contains('port')) return;if(ev.button!==0)return;const el=ev.currentTarget;S.drag={el,id:+el.dataset.id,mx:ev.clientX,my:ev.clientY,ox:parseFloat(el.style.left),oy:parseFloat(el.style.top),moved:false};ev.stopPropagation()}
function portDown(ev){
  ev.stopPropagation();
  const p = ev.currentTarget;
  S.conn = {
    id: +p.dataset.ni,
    side: p.dataset.s,
    col: p.dataset.ci !== undefined ? +p.dataset.ci : undefined
  };
  document.querySelectorAll('.port, .port-row').forEach(el=>el.classList.add('pinned'));
}
function pdrag(ev,t){ev.dataTransfer.setData('nt',t)}

function zoom(d){S.scale=Math.max(0.15,Math.min(3,S.scale+d));applyXf();document.getElementById('zoom-val').textContent=Math.round(S.scale*100)+'%'}
function applyXf(){document.getElementById('canvas').style.transform=`translate(${S.ox}px,${S.oy}px) scale(${S.scale})`}
function fitView(){if(!S.cur?.nodes.length)return;const w=document.getElementById('canvas-wrap');const xs=S.cur.nodes.map(n=>n.x),ys=S.cur.nodes.map(n=>n.y);const pad=80,minX=Math.min(...xs)-pad,minY=Math.min(...ys)-pad,maxX=Math.max(...xs)+280,maxY=Math.max(...ys)+150;const s=Math.min(w.offsetWidth/(maxX-minX),w.offsetHeight/(maxY-minY),1.2)*.85;S.scale=s;S.ox=-minX*s+pad/2;S.oy=-minY*s+pad/2;applyXf();document.getElementById('zoom-val').textContent=Math.round(s*100)+'%'}
function emptyHint(v){document.getElementById('empty-hint').classList.toggle('show',v)}

// ══ CRUD ═════════════════════════════════════════════════════════════════════
const defaultLabels={start:'Start',end:'End',process:'New Step',decision:'Condition',io:'I/O',connector:'Connector',annotation:'Note',table:'new_table',view:'new_view',enum:'NewEnum',note:'Note',subprocess:'Sub-process',delay:'Delay',manual:'Manual Step',datastore:'Data Store',document:'Document',predefined:'Predefined',central:'Central Topic',branch:'Main Branch',subbranch:'Sub-branch',idea:'New Idea',resource:'Resource',module:'Module',method:'Method',idea:'Idea'};
async function addNode(type,x=300,y=240){
  if(!S.cur){ toast('No board open','err'); return; }
  const meta=(type==='table'||type==='view')?{columns:[{name:'id',type:'INT',pk:true,fk:false}]}:{};
  const n=await api.p(`/api/projects/${window._activePid}/boards/${S.cur.id}/nodes`,{label:defaultLabels[type]||type,node_type:type,x,y,width:220,height:60,meta});
  if(n.error){toast('Error: '+n.error,'err');return}
  S.cur.nodes.push(n); makeNode(n); selNode(n.id); emptyHint(false);
  S.diagrams=await api.g(`/api/projects/${window._activePid}/boards`); renderWfList();
}
function addNodeMid(t){
  if(!S.cur){ toast('No board open','err'); return; }
  // Using -1, -1 triggers backend auto-positioning
  addNode(t, -1, -1);
}

async function delNode(){
  const id=S.selN; if(!id)return;
  await api.d(`/api/projects/${window._activePid}/boards/${S.cur.id}/nodes/${id}`);
  S.cur.nodes=S.cur.nodes.filter(n=>n.id!==id);
  S.cur.edges=S.cur.edges.filter(e=>e.source_id!==id&&e.target_id!==id);
  document.getElementById(`n-${id}`)?.remove();
  document.querySelectorAll('.eg').forEach(g=>{if(!S.cur.edges.find(e=>e.id===+g.dataset.id))g.remove()});
  S.selN=null; closeProps(); emptyHint(!S.cur.nodes.length);
  S.diagrams=await api.g(`/api/projects/${window._activePid}/boards`); renderWfList(); toast('Node removed');
}

async function addEdge(src,tgt,sourcePort,targetPort){
  const et=S.cur.type==='db_diagram'?'one_to_many':'default';
  const meta = { source_port: sourcePort, target_port: targetPort };
  const e=await api.p(`/api/projects/${window._activePid}/boards/${S.cur.id}/edges`,{source_id:src,target_id:tgt,edge_type:et,meta});
  if(e.error){toast('Error: '+e.error,'err');return}
  S.cur.edges.push(e); makeEdge(e);
  S.diagrams=await api.g(`/api/projects/${window._activePid}/boards`); renderWfList();
}

async function delEdge(){
  const id=S.selE; if(!id)return;
  await api.d(`/api/projects/${window._activePid}/boards/${S.cur.id}/edges/${id}`);
  S.cur.edges=S.cur.edges.filter(e=>e.id!==id);
  document.querySelector(`.eg[data-id="${id}"]`)?.remove();
  S.selE=null; closeProps();
  S.diagrams=await api.g(`/api/projects/${window._activePid}/boards`); renderWfList(); toast('Connection removed');
}

async function autoLayoutNodes() {
  if(!S.cur) return;
  toast('Arranging nodes...');
  const res = await api.p(`/api/projects/${window._activePid}/boards/${S.cur.id}/auto-layout`, {
    direction: 'LR',
    node_spacing: 80,
    rank_spacing: 300
  });
  if(res.error) { toast('Layout error: ' + res.error, 'err'); return; }
  S.cur = res;
  renderCanvas();
  fitView();
  toast('Layout complete', 'ok');
}

}

function renderEdgeProps(id) {
  const e=S.cur.edges.find(x=>x.id===id); if(!e)return;
  const pi=document.getElementById('pi'); pi.style.background='var(--surface)'; pi.style.color='var(--text-dim)'; pi.textContent='⟶';
  document.getElementById('pt').textContent='Connection';
  const sn=S.cur.nodes.find(n=>n.id===e.source_id)?.label||'?', tn=S.cur.nodes.find(n=>n.id===e.target_id)?.label||'?';
  const ets=S.cur.type==='db_diagram'?['one_to_one','one_to_many','many_to_many','belongs_to']:['default','success','failure','conditional'];
  document.getElementById('pb').innerHTML=`
    <div class="pg"><div class="plabel">Label</div><input class="pinput" value="${esc(e.label)}" oninput="up_elabel(this.value)"></div>
    <div class="pg"><div class="plabel">Type</div><select class="pselect" onchange="up_etype(this.value)">${ets.map(t=>`<option value="${t}" ${e.edge_type===t?'selected':''}>${t}</option>`).join('')}</select></div>
    <div class="pg"><div class="plabel">Connection</div>
      <div style="display:flex;align-items:center;gap:6px;padding:8px 10px;background:var(--surface);border-radius:var(--r);border:1px solid var(--panel-border)">
        <span style="font-size:11px">${esc(sn)}</span><span style="color:var(--accent)">→</span><span style="font-size:11px">${esc(tn)}</span>
      </div>
    </div>
    <div class="psep"></div>
    <div class="dz"><button class="btn btn-danger-soft" style="width:100%;justify-content:center" onclick="delEdge()">× Delete Connection</button></div>`;
}

async function up_label(v){const n=S.cur.nodes.find(x=>x.id===S.selN);if(!n)return;n.label=v;document.getElementById('pt').textContent=v;refreshNode(n);await api.h(`/api/projects/${window._activePid}/boards/${S.cur.id}/nodes/${n.id}`,{label:v})}
async function up_type(v){const n=S.cur.nodes.find(x=>x.id===S.selN);if(!n)return;n.node_type=v;const def=getDef(v);const pi=document.getElementById('pi');pi.style.background=def.b;pi.style.color=def.c;pi.textContent=def.i;refreshNode(n);await api.h(`/api/projects/${window._activePid}/boards/${S.cur.id}/nodes/${n.id}`,{node_type:v});renderNodeProps(n.id)}
async function up_desc(v){const n=S.cur.nodes.find(x=>x.id===S.selN);if(!n)return;n.meta={...n.meta,description:v};refreshNode(n);await api.h(`/api/projects/${window._activePid}/boards/${S.cur.id}/nodes/${n.id}`,{meta:n.meta})}
async function up_meta(nid,k,v){
  const n=S.cur.nodes.find(x=>x.id===nid); if(!n)return;
  n.meta=n.meta||{}; n.meta[k]=v;
  if(k==='ref_diagram_id'){ delete n.meta.ref_node_id; delete n.meta.columns; n.label='External Table' }
  refreshNode(n); await api.h(`/api/projects/${window._activePid}/boards/${S.cur.id}/nodes/${nid}`,{meta:n.meta, label:n.label});
  renderNodeProps(nid);
}
async function syncExtTable(nid, refNid){
  const n=S.cur.nodes.find(x=>x.id===nid); if(!n) return;
  const tables = await api.g(`/api/projects/${window._activePid}/all-tables`);
  const t = tables.find(x=>x.id===refNid);
  if(t){
    n.label = t.label;
    n.meta.columns = t.meta?.columns || [];
    refreshNode(n);
    await api.h(`/api/projects/${window._activePid}/boards/${S.cur.id}/nodes/${nid}`,{meta:n.meta, label:n.label});
  }
}
async function up_pos(){const n=S.cur.nodes.find(x=>x.id===S.selN);if(!n)return;const x=+document.getElementById('pp-x').value,y=+document.getElementById('pp-y').value;n.x=x;n.y=y;const el=document.getElementById(`n-${n.id}`);el.style.left=x+'px';el.style.top=y+'px';posAll();await api.h(`/api/projects/${window._activePid}/boards/${S.cur.id}/nodes/${n.id}`,{x,y})}
async function addCol(nid){const n=S.cur.nodes.find(x=>x.id===nid);if(!n)return;n.meta=n.meta||{};n.meta.columns=n.meta.columns||[];n.meta.columns.push({name:'new_col',type:'VARCHAR',pk:false,fk:false});await api.h(`/api/projects/${window._activePid}/boards/${S.cur.id}/nodes/${nid}`,{meta:n.meta});refreshNode(n);renderNodeProps(nid)}
async function editCol(nid,i,f,v){const n=S.cur.nodes.find(x=>x.id===nid);if(!n||!n.meta?.columns)return;n.meta.columns[i][f]=v;refreshNode(n);await api.h(`/api/projects/${window._activePid}/boards/${S.cur.id}/nodes/${nid}`,{meta:n.meta})}
async function rmCol(nid,i){const n=S.cur.nodes.find(x=>x.id===nid);if(!n||!n.meta?.columns)return;n.meta.columns.splice(i,1);await api.h(`/api/projects/${window._activePid}/boards/${S.cur.id}/nodes/${nid}`,{meta:n.meta});refreshNode(n);renderNodeProps(nid)}
async function up_elabel(v){const e=S.cur.edges.find(x=>x.id===S.selE);if(!e)return;e.label=v;await api.h(`/api/projects/${window._activePid}/boards/${S.cur.id}/edges/${e.id}`,{label:v});posEdge(e)}
async function up_etype(v){const e=S.cur.edges.find(x=>x.id===S.selE);if(!e)return;e.edge_type=v;await api.h(`/api/projects/${window._activePid}/boards/${S.cur.id}/edges/${e.id}`,{edge_type:v});const p=document.querySelector(`.eg[data-id="${e.id}"] .epath`);if(p){p.className=`epath sel et-${v}`;p.setAttribute('marker-end','url(#m-acc)')}}

// ══ API Modal ════════════════════════════════════════════════════════════════
async function showApiModal(){
  document.getElementById('api-modal').style.display='flex';
  const docs=await api.g('/api');
  const el=document.getElementById('api-content');
  const MT={'GET':['m-get','GET'],'POST':['m-post','POST'],'PUT':['m-put','PUT'],'DELETE':['m-del','DEL'],'PATCH':['m-put','PATCH']};
  el.innerHTML=`<div style="font-size:11px;color:var(--text-dim);margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--panel-border)">Base URL: <code style="color:var(--accent);font-size:11px">http://localhost:5000</code></div>`+
  Object.entries(docs.endpoints).map(([g,eps])=>`
    <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-dim);margin:12px 0 5px">${g}</div>
    ${Object.entries(eps).map(([route,desc])=>{
      const [m,...pp]=route.trim().split(/\s+/);
      const [cls,lbl]=(MT[m]||['m-get',m]);
      return `<div class="api-row"><span class="method-tag ${cls}">${lbl}</span><div><div class="api-path">${esc(pp.join(' '))}</div><div class="api-desc">${esc(String(desc))}</div></div></div>`;
    }).join('')}`).join('');
}

// ══ Utils ════════════════════════════════════════════════════════════════════
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
let _tt;
function toast(msg,k=''){const el=document.getElementById('toast');el.textContent=msg;el.className='show'+(k?' '+k:'');clearTimeout(_tt);_tt=setTimeout(()=>{el.className=''},2400)}

// ── REAL-TIME EVENTS ──────────────────────────────────────────
function initRealtimeEvents() {
  console.log('📡 Initializing Real-time Events (Editor)...');
  const source = new EventSource('/api/events');
  source.onmessage = (e) => {
    try {
      const { type, data } = JSON.parse(e.data);
      if (type === 'system_change') {
        // If it's a board update for THIS board, refresh
        if (S.cur && data.path.includes(`/boards/${S.cur.id}`)) {
          console.log('🔄 Remote board change detected, refreshing...', data.tool);
          refreshBoardData();
          if (data.tool) toast(`AI (${data.tool}) updated board`, 'ok');
        }
      } else if (type === 'mcp_tool_call') {
        showMcpIndicator(data.tool);
      }
    } catch(err) { console.error('SSE Error:', err); }
  };
}

async function refreshBoardData() {
  if (!S.cur) return;
  const board = await api.g(`/api/projects/${window._activePid}/boards/${S.cur.id}`);
  if (board.error) return;
  S.cur = board;
  renderCanvas();
  // Optional: only fit view if it's the first load or explicit
}

let _mcpIndicatorTimeout = null;
function showMcpIndicator(tool) {
  const container = document.getElementById('mcp-status-container');
  if (!container) return;
  container.innerHTML = '';
  const el = document.createElement('div');
  el.className = 'mcp-indicator';
  el.innerHTML = `<div class="icon">🤖</div><div class="body"><div class="title">AI is thinking...</div><div class="tool">${tool}</div></div><div class="dots"><span></span><span></span><span></span></div>`;
  container.appendChild(el);
  clearTimeout(_mcpIndicatorTimeout);
  _mcpIndicatorTimeout = setTimeout(() => {
    el.style.transform = 'translateX(100%)'; el.style.opacity = '0'; el.style.transition = 'all .4s ease-in';
    setTimeout(() => el.remove(), 400);
  }, 4000);
}

init();
initRealtimeEvents();

</script>
