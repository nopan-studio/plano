<script>
const B = window.location.origin;
let _projects = [];
let _activeProject = null; // {id, name}

// ── API ───────────────────────────────────────────────────────
async function api(method, path, body=null) {
  const opts = {method, headers:{'Content-Type':'application/json'}};
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(B + path, opts);
  return r.json();
}

function toast(msg, cls='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = cls+' show';
  setTimeout(()=>t.className='', 2600);
}

function esc(s) { const d=document.createElement('div'); d.textContent=String(s??''); return d.innerHTML; }
function md(s) {
  if (!s) return '';
  let res = esc(s);

  // 1. Block code ```...``` - do this before any other processing to avoid breaking content inside
  res = res.replace(/```([\s\S]*?)```/g, function(match, code) {
    return `<pre class="md-code-block"><code>${code.trim()}</code></pre>`;
  });

  // 2. Custom symbols & indicators
  res = res.replace(/\[x\]/gi, '<span style="color:var(--green)">✅</span>')
     .replace(/\[ \]/g, '<span style="color:var(--text-dim)">⬜</span>')
     .replace(/\(!\)/g, '<span title="Blocker">⚠️</span>')
     .replace(/\(\?\)/g, '<span title="Query">❓</span>')
     .replace(/\(\*\)/g, '<span style="color:var(--amber)">⭐</span>')
     .replace(/\(i\)/g, '<span style="color:var(--blue)">ℹ️</span>')
     .replace(/\(v\)/gi, '<span style="color:var(--green)">✅</span>')
     .replace(/\(x\)/gi, '<span style="color:var(--rose)">❌</span>');

  // 3. Text formatting (Inline)
  res = res.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
     .replace(/\*(.+?)\*/g, '<em>$1</em>')
     .replace(/~~(.+?)~~/g, '<del>$1</del>')
     .replace(/`([^`\n]+)`/g, '<code>$1</code>');

  // 4. Links [text](url)
  res = res.replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" target="_blank" class="md-link">$1</a>');

  // 5. Line-based processing
  const lines = res.split('\n');
  const processed = [];
  
  for (let line of lines) {
    let l = line.trim();
    
    // Horizontal Rule
    if (l === '---') {
      processed.push('<hr class="md-hr">');
      continue;
    }

    // Hashtags
    line = line.replace(/(^|\s)#(\w+)/g, '$1<span class="md-tag">#$2</span>');

    // Headers
    if (l.startsWith('# ')) {
      processed.push(`<h3 class="md-h1">${l.substring(2)}</h3>`);
    } else if (l.startsWith('## ')) {
      processed.push(`<h4 class="md-h2">${l.substring(3)}</h4>`);
    } else if (l.startsWith('### ')) {
      processed.push(`<h5 class="md-h3">${l.substring(4)}</h5>`);
    }
    // Blockquote
    else if (l.startsWith('> ')) {
      processed.push(`<blockquote class="md-quote">${l.substring(2)}</blockquote>`);
    }
    // Lists
    else if (l.startsWith('- ') || l.startsWith('* ')) {
      processed.push(`<div class="md-li"><span>•</span> ${l.substring(2)}</div>`);
    } else if (/^\d+\.\s/.test(l)) {
      processed.push(`<div class="md-li"><span>${l.split('.')[0]}.</span> ${l.split('.').slice(1).join('.').trim()}</div>`);
    }
    // Regular line
    else {
      processed.push(line ? `<div>${line}</div>` : '<div style="height:8px"></div>');
    }
  }

  return processed.join('');
}

function fmtDate(s) { return s ? new Date(s).toLocaleDateString() : '—'; }
function timeAgo(s) {
  const d = (Date.now() - new Date(s)) / 1000;
  if (d < 60) return 'just now';
  if (d < 3600) return Math.floor(d/60) + 'm ago';
  if (d < 86400) return Math.floor(d/3600) + 'h ago';
  return Math.floor(d/86400) + 'd ago';
}

function renderFilesMeta(files, pid, tid) {
  if (!files || !files.length) return '';
  const list = typeof files === 'string' ? JSON.parse(files) : files;
  if (!list.length) return '';
  const canDiff = pid && tid && tid !== -1;
  return `
    <div class="dm-section">
      <div class="dm-section-label">Files Affected</div>
      <div class="file-list">
        ${list.map(f => `
          <div class="file-item-wrap">
            <div class="file-item" ${canDiff ? `onclick="toggleFileDiff(this, ${pid}, ${tid}, '${esc(f.path)}')"` : ''}>
              <span class="file-action fa-${f.action}">${f.action}</span>
              <span class="file-path">${esc(f.path)}</span>
              ${canDiff ? `<span style="font-size:10px;color:var(--dim);opacity:.5">▼</span>` : ''}
            </div>
            <div class="file-diff-view" style="display:none;background:var(--bg);margin-top:-2px;border:1px solid var(--b2);border-radius:0 0 var(--r) var(--r);overflow:hidden"></div>
          </div>
        `).join('')}
      </div>
    </div>`;
}

// ── localStorage active project ───────────────────────────────
function setActiveProject(p) {
  _activeProject = p;
  if (p) localStorage.setItem('fmc_active_project', JSON.stringify(p));
  else localStorage.removeItem('fmc_active_project');
}
function getActiveProject() {
  try { return JSON.parse(localStorage.getItem('fmc_active_project')); } catch { return null; }
}

// ── Router ────────────────────────────────────────────────────
function route() {
  const hash = location.hash || '#/';
  const m = {
    home:  hash === '#/' || hash === '',
    ideas: hash === '#/ideas',
    proj:  hash.match(/^#\/projects\/(\d+)$/),
    tasks: hash.match(/^#\/projects\/(\d+)\/tasks$/),
    milestones: hash.match(/^#\/projects\/(\d+)\/milestones$/),
    changelog:  hash.match(/^#\/projects\/(\d+)\/project-logs$/),
    updates:    hash.match(/^#\/projects\/(\d+)\/updates$/),
    pideas:     hash.match(/^#\/projects\/(\d+)\/ideas$/),
    boards:     hash.match(/^#\/projects\/(\d+)\/boards$/),
    archive:    hash.match(/^#\/projects\/(\d+)\/archive$/),
  };
  if      (m.home)       renderHome();
  else if (m.ideas)      renderAllIdeas();
  else if (m.tasks)      renderTasks(+m.tasks[1]);
  else if (m.milestones) renderMilestones(+m.milestones[1]);
  else if (m.changelog)  renderChangelog(+m.changelog[1]);
  else if (m.updates)    renderUpdates(+m.updates[1]);
  else if (m.pideas)     renderIdeas(+m.pideas[1]);
  else if (m.boards)     renderBoards(+m.boards[1]);
  else if (m.archive)    renderArchive(+m.archive[1]);
  else if (m.proj)       renderProject(+m.proj[1]);
  else                   renderHome();
  
  if (typeof renderSidebar === 'function') renderSidebar();
}
window.addEventListener('hashchange', route);

// ── Sidebar ───────────────────────────────────────────────────
function toggleWorkspaces() {
  document.getElementById('workspaces-list').classList.toggle('show');
}

// Close dropdown on click outside
window.addEventListener('click', e => {
  if (!e.target.closest('.workspaces-dropdown')) {
    document.getElementById('workspaces-list').classList.remove('show');
  }
});

async function loadSidebar() {
  _projects = await api('GET', '/api/projects');
  renderSidebar();
}

function renderSidebar() {
  const listEl = document.getElementById('workspaces-list');
  const activeNameEl = document.getElementById('active-workspace-name');
  if (!listEl) return;
  
  listEl.innerHTML = _projects.map(p =>
    `<a href="#/projects/${p.id}" data-pid="${p.id}" onclick="toggleWorkspaces()">${esc(p.name)}
      <span class="badge">${p.task_count||0}</span>
    </a>`
  ).join('');

  // Update active workspace name
  const pid = getActivePidFromUrl();
  const current = _projects.find(p => p.id === pid);
  if (current) {
    activeNameEl.textContent = current.name;
    renderSidebarSubnav(pid);
  } else {
    activeNameEl.textContent = 'Select Workspace';
    document.getElementById('sidebar-subnav').style.display = 'none';
  }

  // Highlight active items
  const curHash = location.hash || '#/';
  document.querySelectorAll('.sidebar a, .nav-item, .subnav-item').forEach(a => {
    const href = a.getAttribute('href');
    a.classList.toggle('act', href === curHash || (curHash==='' && href==='#/'));
  });
}

function getActivePidFromUrl() {
  const m = location.hash.match(/^#\/projects\/(\d+)/);
  return m ? +m[1] : null;
}

const sidebarIcons = {
  Overview: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3h18v18H3zM3 9h18M9 21V9"/></svg>`,
  Tasks: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>`,
  Milestones: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>`,
  Boards: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>`,
  Updates: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>`,
  Ideas: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>`,
  'Project Logs': `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>`,
  Archive: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="21 8 21 21 3 21 3 8"/><rect width="22" height="5" x="1" y="3"/><line x1="10" y1="12" x2="14" y2="12"/></svg>`
};

function renderSidebarSubnav(pid) {
  const subnav = document.getElementById('sidebar-subnav');
  const curHash = location.hash;
  const tabs = ['Overview', 'Tasks', 'Milestones', 'Boards', 'Updates', 'Archive', 'Project Logs'];
  
  subnav.innerHTML = `
    <div class="sidebar-hd">Navigation</div>
    ${tabs.map(t => {
      const slug = t.toLowerCase().replace(' ', '-');
      const href = slug === 'overview' ? `#/projects/${pid}` : `#/projects/${pid}/${slug}`;
      const isAct = curHash === href;
      return `<a href="${href}" class="subnav-item ${isAct ? 'act' : ''}">${sidebarIcons[t]||''} ${t}</a>`;
    }).join('')}
  `;
  subnav.style.display = 'block';
}

function setBreadcrumb(items) {
  const el = document.getElementById('breadcrumb');
  el.innerHTML = items.map((it,i) =>
    i < items.length-1
      ? `<a href="${it.href||'#/'}">${esc(it.label)}</a><span class="sep">›</span>`
      : `<span>${esc(it.label)}</span>`
  ).join('');
}

// ── Helpers ───────────────────────────────────────────────────
function view(html) {
  document.getElementById('main-view').innerHTML = html;
  return Promise.resolve();
}


// ── HOME ──────────────────────────────────────────────────────
async function renderHome() {
  setBreadcrumb([{label:'Overview'}]);
  await loadSidebar();
  const projects = _projects;

  const totalTasks = projects.reduce((s,p)=>s+(p.task_count||0),0);
  const totalActive = projects.filter(p=>p.status==='active').length;
  const totalDone = projects.filter(p=>p.status==='completed').length;

  view(`
    <div class="page-hd">
      <div>
        <h1>Overview</h1>
        <div class="sub">At-a-glance view of all project statuses and team progress</div>
      </div>
      <button class="btn btn-acc btn-sm" style="margin-left:auto" onclick="openProjectCreateModal()">+ New Project</button>
    </div>
    <div class="stat-row">
      <div class="stat"><div class="stat-v">${projects.length}</div><div class="stat-l">Projects</div></div>
      <div class="stat"><div class="stat-v">${totalActive}</div><div class="stat-l">Active</div></div>
      <div class="stat"><div class="stat-v">${totalDone}</div><div class="stat-l">Completed</div></div>
      <div class="stat"><div class="stat-v">${totalTasks}</div><div class="stat-l">Total Tasks</div></div>
    </div>
    <div class="cards" id="project-cards">
      ${projects.length ? projects.map(p => `
        <div class="card" onclick="location.hash='#/projects/${p.id}'">
          <div class="card-title">${esc(p.name)}</div>
          <div class="card-desc">${esc(p.description||'No description')}</div>
          <div class="card-meta">
            <span class="badge s-${p.status}">${p.status}</span>
            <span class="badge p-${p.priority}">● ${p.priority}</span>
            <span style="font-size:11px;color:var(--dim);font-family:var(--mono);margin-left:auto">${p.task_count||0} tasks</span>
          </div>
          <div class="prog"><div class="prog-bar" style="width:${p.progress_pct||0}%"></div></div>
        </div>
      `).join('') : '<div class="empty"><div class="icon">📁</div><p>No projects yet. Create one above.</p></div>'}
    </div>
  `);
}

window.openProjectCreateModal = function() {
  document.getElementById('detail-modal-root').innerHTML = `
    <div class="detail-overlay" onclick="if(event.target===this)closeDetailModal()">
      <div class="detail-modal">
        <div class="dm-header">
          <div class="dm-header-icon">📁</div>
          <div class="dm-header-body">
            <h2>Create New Project</h2>
          </div>
          <button class="dm-close" onclick="closeDetailModal()">✕</button>
        </div>
        <div class="dm-body">
          <div class="dm-section">
            <label class="dm-section-label">Project Name</label>
            <input type="text" id="np-name" placeholder="Enter project name">
          </div>
          <div class="dm-section">
            <label class="dm-section-label">Priority</label>
            <select id="np-priority" class="full">
              <option value="low">Low</option>
              <option value="medium" selected>Medium</option>
              <option value="high">High</option>
              <option value="critical">Critical</option>
            </select>
          </div>
          <div class="dm-section">
            <label class="dm-section-label">Description</label>
            <textarea id="np-desc" placeholder="A brief overview of the project"></textarea>
          </div>
        </div>
        <div class="dm-footer">
          <button class="btn btn-out btn-sm" onclick="closeDetailModal()">Cancel</button>
          <button class="btn btn-acc btn-sm" onclick="saveNewProject()">Create Project</button>
        </div>
      </div>
    </div>`;
};

window.saveNewProject = async function() {
  const name = document.getElementById('np-name').value.trim();
  if (!name) return toast('Name required', 'err');
  const d = await api('POST', '/api/projects', {
    name, 
    priority: document.getElementById('np-priority').value,
    description: document.getElementById('np-desc').value.trim(),
    status: 'planning'
  });
  if (d.error) return toast(d.error, 'err');
  toast('Project created!');
  closeDetailModal();
  await loadSidebar();
  location.hash = '#/projects/' + d.id;
};

// ── PROJECT OVERVIEW ──────────────────────────────────────────
async function renderProject(pid) {
  const [proj, dash, tasks, milestones] = await Promise.all([
    api('GET',`/api/projects/${pid}`),
    api('GET',`/api/projects/${pid}/dashboard`),
    api('GET',`/api/projects/${pid}/tasks`),
    api('GET',`/api/projects/${pid}/milestones`),
  ]);
  setActiveProject({id:pid, name:proj.name});
  window._pid = pid;
  setBreadcrumb([{label:'Overview',href:'#/'},{label:proj.name}]);

  const byStatus = dash.tasks_by_status || {};
  view(`
    <div class="page-hd">
      <div>
        <h1>${esc(proj.name)}</h1>
        <div class="sub">Project overview, metrics, and latest workspace activity</div>
      </div>
      <div style="display:flex;gap:8px;margin-left:auto;align-items:center">
        <span class="badge s-${proj.status}">${proj.status}</span>
        <span class="badge p-${proj.priority}">● ${proj.priority}</span>
        <button class="btn btn-ghost btn-sm" onclick="deleteProject(${pid})" title="Delete project"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg></button>
      </div>
    </div>

    <div class="section-hd">About Project</div>
    <div class="prose-wrap" style="margin-bottom:24px; font-size:15px; line-height:1.8; color:var(--text); opacity:0.85; max-width:100%">
      ${md(proj.description || '*No detailed description provided.*')}
    </div>

    <div class="stat-row">
      <div class="stat"><div class="stat-v">${dash.tasks_total}</div><div class="stat-l">Total Tasks</div></div>
      <div class="stat"><div class="stat-v">${byStatus.done||0}</div><div class="stat-l">Completed</div></div>
      <div class="stat"><div class="stat-v">${byStatus.in_progress||0}</div><div class="stat-l">Active</div></div>
      <div class="stat"><div class="stat-v">${dash.milestones_total}</div><div class="stat-l">Milestones</div></div>
      <div class="stat"><div class="stat-v">${dash.boards_total}</div><div class="stat-l">Boards</div></div>
      <div class="stat"><div class="stat-v">${proj.progress_pct||0}%</div><div class="stat-l">Work Progress</div></div>
    </div>

    <div style="display:grid;grid-template-columns:1.2fr 1fr;gap:24px;margin-top:24px">
      <div>
        <div class="section-hd">Workspace Metadata</div>
        <div class="form-card">
          <div class="dm-field-row">
            <div class="dm-field">
              <label>Status</label>
              <select id="p-status" onchange="patchProject(${pid},{status:this.value})">${['planning','active','on_hold','completed','archived'].map(s=>`<option value="${s}"${proj.status===s?' selected':''}>${s}</option>`).join('')}</select>
            </div>
            <div class="dm-field">

  const text = await file.text();

async function renderTasks(pid) {
  const [proj, tasks, milestones] = await Promise.all([
    api('GET',`/api/projects/${pid}`),
    api('GET',`/api/projects/${pid}/tasks`),
    api('GET',`/api/projects/${pid}/milestones`),
  ]);
  setActiveProject({id:pid,name:proj.name});
  setBreadcrumb([{label:'Overview',href:'#/'},{label:proj.name,href:`#/projects/${pid}`},{label:'Tasks'}]);
  const msOpts = milestones.map(m=>`<option value="${m.id}">${esc(m.name)}</option>`).join('');
  const activeTasks = (tasks||[]).filter(t => t.status !== 'archived');
  window._tasks = activeTasks; window._milestones = milestones;

  const savedOrder = getKanbanOrder(pid);
  function sortByOrder(arr, status) {
    const order = savedOrder[status] || [];
    if (!order.length) return arr;
    return arr.slice().sort((a,b) => {
      const ia = order.indexOf(a.id), ib = order.indexOf(b.id);
      if (ia === -1 && ib === -1) return 0;
      if (ia === -1) return 1;
      if (ib === -1) return -1;
      return ia - ib;
    });
  }
  const todo = sortByOrder(activeTasks.filter(t=>t.status==='todo'), 'todo');
  const progress = sortByOrder(activeTasks.filter(t=>t.status==='in_progress'), 'in_progress');
  const review = sortByOrder(activeTasks.filter(t=>t.status==='review'), 'review');
  const done = sortByOrder(activeTasks.filter(t=>t.status==='done'), 'done');
  const bugs = sortByOrder(activeTasks.filter(t=>t.status==='bugs'), 'bugs');

  function kCard(t) {
    const pColor = {low:'var(--dim)',medium:'var(--blue)',high:'var(--amber)',critical:'var(--rose)'}[t.priority]||'var(--dim)';
    const ms = (milestones||[]).find(m=>m.id===t.milestone_id);
    const aiActive = t.is_ai_working ? ' ai-active' : '';
    const aiBadge = t.is_ai_working ? '<div class="ai-badge"><span></span> AI Working</div>' : '';
    return `<div class="k-card${aiActive}" id="task-${t.id}" style="view-transition-name: task-card-${t.id}" draggable="true" data-task-id="${t.id}" data-status="${t.status}" onclick="openTaskDetail(${pid},${t.id})">
      <div class="k-card-id">#${t.id}</div>
      ${aiBadge}
      <div class="k-card-title">${esc(t.title)}</div>
      ${t.description?`<div class="k-card-sub">${esc(t.description)}</div>`:''}
      <div class="k-card-chips">
        <span class="chip" style="color:${pColor};background:var(--surf2)">● ${t.priority}</span>
        ${t.assignee?`<span class="chip chip-assignee"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:-1px"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> ${esc(t.assignee)}</span>`:''}
        ${t.due_date?`<span class="chip chip-due"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:-1px"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg> ${fmtDate(t.due_date)}</span>`:''}
        ${ms?`<span class="chip chip-ms"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:-1px"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" x2="4" y1="22" y2="15"/></svg> ${esc(ms.name)}</span>`:''}
      </div>
    </div>`;
  }

  await view(`
    <div class="page-hd">
      <div>
        <h1>Tasks</h1>
        <div class="sub">Track progress and manage team workflows through columns</div>
      </div>
    </div>
    <div id="task-form" class="form-card" style="display:none;margin-bottom:14px">
      <h3>New Task</h3>
      <div class="form-row">
        <input id="tf-title" type="text" placeholder="Task title" style="flex:3">
        <input id="tf-assignee" type="text" placeholder="Assignee" style="flex:1">
      </div>
      <div class="form-row">
        <select id="tf-status" style="flex:1;background:var(--surf);border:1px solid var(--b2);border-radius:var(--r);color:var(--text);font-family:var(--sans);font-size:13px;padding:7px 10px">
          <option value="todo">To Do</option><option value="in_progress">In Progress</option><option value="review">Review</option><option value="done">Done</option><option value="bugs">Bugs</option>
        </select>
        <select id="tf-priority" style="flex:1;background:var(--surf);border:1px solid var(--b2);border-radius:var(--r);color:var(--text);font-family:var(--sans);font-size:13px;padding:7px 10px">
          <option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option><option value="critical">Critical</option>
        </select>
        <select id="tf-milestone" style="flex:1;background:var(--surf);border:1px solid var(--b2);border-radius:var(--r);color:var(--text);font-family:var(--sans);font-size:13px;padding:7px 10px">
          <option value="">No milestone</option>${msOpts}
        </select>
        <input id="tf-due" type="date" style="flex:1">
      </div>
      <div class="form-row"><input id="tf-desc" type="text" placeholder="Description"></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-acc btn-sm" onclick="createTask(${pid})">Create</button>
        <button class="btn btn-out btn-sm" onclick="toggleTaskForm(${pid})">Cancel</button>
      </div>
    </div>
    <div class="kanban">
      <div class="kanban-col col-todo">
        <div class="kanban-col-hd">
          <h3><span class="status-circle"></span> To Do <span class="cnt">${todo.length}</span></h3>
          <div class="kanban-col-hd-right">
            <button class="add-task-col-btn" onclick="toggleTaskForm(${pid}, 'todo')" title="Add task to To Do">+</button>

        <div class="kanban-col-body" data-status="todo">${todo.map(kCard).join('')||'<div style="text-align:center;padding:20px;color:var(--dim);font-size:12px">No tasks</div>'}</div>
      </div>
      <div class="kanban-col col-progress">
        <div class="kanban-col-hd">
          <h3><span class="status-circle"></span> In Progress <span class="cnt">${progress.length}</span></h3>
          <div class="kanban-col-hd-right">
            <button class="add-task-col-btn" onclick="toggleTaskForm(${pid}, 'in_progress')" title="Add task to In Progress">+</button>
          </div>
        </div>
        <div class="kanban-col-sub">Work currently being tackled</div>
        <div class="kanban-col-body" data-status="in_progress">${progress.map(kCard).join('')||'<div style="text-align:center;padding:20px;color:var(--dim);font-size:12px">No tasks</div>'}</div>
      </div>
      <div class="kanban-col col-review">
        <div class="kanban-col-hd">
          <h3><span class="status-circle"></span> Review <span class="cnt">${review.length}</span></h3>
          <div class="kanban-col-hd-right">
            <button class="add-task-col-btn" onclick="toggleTaskForm(${pid}, 'review')" title="Add task to Review">+</button>
          </div>
        </div>
        <div class="kanban-col-sub">Pending peer approval</div>
        <div class="kanban-col-body" data-status="review">${review.map(kCard).join('')||'<div style="text-align:center;padding:20px;color:var(--dim);font-size:12px">No reviews</div>'}</div>
      </div>
      <div class="kanban-col col-done">
        <div class="kanban-col-hd">
          <h3><span class="status-circle"></span> Done <span class="cnt">${done.length}</span></h3>
          <div class="kanban-col-hd-right">
            ${done.length > 0 ? `<button class="btn btn-ghost btn-xs" onclick="archiveAllDoneTasksUI(${pid})" title="Archive all Done tasks" style="margin-right:4px;padding:2px 6px;font-size:10px;text-transform:uppercase;font-weight:700;color:var(--mid)">Archive All</button>` : ''}
            <button class="add-task-col-btn" onclick="toggleTaskForm(${pid}, 'done')" title="Add task to Done">+</button>
          </div>
        </div>
        <div class="kanban-col-sub">Completed successfully</div>
        <div class="kanban-col-body" data-status="done">${done.map(kCard).join('')||'<div style="text-align:center;padding:20px;color:var(--dim);font-size:12px">No completed tasks</div>'}</div>
      </div>
      <div class="kanban-col col-bugs">
        <div class="kanban-col-hd">
          <h3><span class="status-circle"></span> Bugs <span class="cnt">${bugs.length}</span></h3>
          <div class="kanban-col-hd-right">
            <button class="add-task-col-btn" onclick="toggleTaskForm(${pid}, 'bugs')" title="Add task to Bugs">+</button>
          </div>
        </div>
        <div class="kanban-col-sub">Issues needing attention</div>
        <div class="kanban-col-body" data-status="bugs">${bugs.map(kCard).join('')||'<div style="text-align:center;padding:20px;color:var(--dim);font-size:12px">No bugs recorded</div>'}</div>
      </div>
    </div>
  `);
  window._pid = pid;
  initKanbanDragDrop(pid);
  initKanbanPanning();
}

window.archiveTask = async function(pid, tid) {
  let t = (window._tasks||[]).find(x=>x.id===tid);
  if (!t) {
    // Try to fetch from API if not in cache (e.g. if viewing archived task or after refresh)
    t = await api('GET', `/api/projects/${pid}/tasks/${tid}`);
  }
  if (!t) return toast('Task not found','err');
  if (t.status === 'archived') return toast('Task is already archived');
  
  const orgStatus = t.status;
  const r = await api('PATCH', `/api/projects/${pid}/tasks/${tid}`, {
    status: 'archived',
    meta: { ...(t.meta||{}), original_status: orgStatus }
  });
  if (r.error) return toast(r.error,'err');
  toast('Task archived'); closeDetailModal(); renderTasks(pid);
};

window.renderArchive = async function(pid) {

  setBreadcrumb([{label:'Overview',href:'#/'},{label:proj.name,href:`#/projects/${pid}`},{label:'Archive'}]);

  const sF = document.getElementById('af-status')?.value || 'all';
  const dF = document.getElementById('af-df')?.value || '';

  let filtered = archived;
  if (sF !== 'all') filtered = filtered.filter(t => ((t.meta||{}).original_status === sF));

  if (dT) filtered = filtered.filter(t => t.updated_at.split('T')[0] <= dT);

  const rows = filtered.map(t => {
    const meta = t.meta || {};

  await view(`

      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('af-status').value='all';document.getElementById('af-df').value='';document.getElementById('af-dt').value='';renderArchive(${pid})">Clear</button>

      <table class="tbl">

        <tbody>${rows || '<tr><td colspan="4" style="text-align:center;padding:60px 20px;color:var(--mid)"><div style="font-size:24px;margin-bottom:12px;opacity:0.3">◈</div>No archived tasks found</td></tr>'}</tbody>

async function renderChangelog(pid) {
  const [proj, cl, tasks, milestones, boards] = await Promise.all([
    api('GET',`/api/projects/${pid}`),
    api('GET',`/api/projects/${pid}/changelog?per_page=100`),
    api('GET',`/api/projects/${pid}/tasks`),
    api('GET',`/api/projects/${pid}/milestones`),
    api('GET',`/api/projects/${pid}/boards`),
  ]);
  setActiveProject({id:pid,name:proj.name});
  setBreadcrumb([{label:'Overview',href:'#/'},{label:proj.name,href:`#/projects/${pid}`},{label:'Project Logs'}]);
  window._recent_changelog = cl.entries;

  // Build name lookup maps
  const nameMap = {project:{}, task:{}, milestone:{}, board:{}, update:{}, idea:{}};
  nameMap.project[pid] = proj.name;
  (tasks||[]).forEach(t => nameMap.task[t.id] = t.title);
  (milestones||[]).forEach(m => nameMap.milestone[m.id] = m.name);
  (boards||[]).forEach(b => nameMap.board[b.id] = b.name);
  window._cl_name_map = nameMap;
  function entityName(type, id) {
    return (nameMap[type] && nameMap[type][id]) || `${type} #${id}`;
  }

  // Group by calendar day
  const grouped = {};
  cl.entries.forEach(c => {
    const day = new Date(c.timestamp).toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
    (grouped[day] = grouped[day]||[]).push(c);
  });
  const entityIcons = {
    project: `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:-2.5px"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>`,
    task: `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:-2.5px"><polyline points="20 6 9 17 4 12"/></svg>`,
    milestone: `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:-2.5px"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" x2="4" y1="22" y2="15"/></svg>`,
    board: `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:-2.5px"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>`,
    update: `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:-2.5px"><path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z"/></svg>`,
    idea: `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:-2.5px"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>`
  };

  function clSummary(c) {
    const name = entityName(c.entity_type, c.entity_id);
    if (c.action === 'created') return `Created <strong>${esc(c.entity_type)}</strong>: ${esc(name)}`;
    if (c.action === 'deleted') return `Deleted <strong>${esc(c.entity_type)}</strong>: ${esc(name)}`;
    if (c.field_changed === 'updated_at') return `Updated <strong>${esc(name)}</strong>`;
    if (c.field_changed) return `Changed <strong>${esc(c.field_changed)}</strong> on ${esc(name)}`;
    return `${c.action} ${esc(c.entity_type)}: ${esc(name)}`;
  }

  view(`
    <div class="page-hd">
      <div>
        <h1>Project Logs</h1>
        <div class="sub">A chronological audit trail of all manual and AI modifications</div>
      </div>
      <span style="font-size:12px;color:var(--mid);margin-left:auto;font-family:var(--mono)">${cl.total} entries</span>
    </div>
    <div class="prose-wrap">
      ${Object.keys(grouped).length ? Object.entries(grouped).map(([day,entries])=>`
        <div class="cl-day">
          <div class="cl-day-label"><span>${day}</span></div>
          ${entries.map(c=>`
            <div class="cl-entry act-${c.action}" style="cursor:pointer" onclick="openChangelogDetail(window._recent_changelog.find(x=>x.id===${c.id}))">
              <div class="cl-entry-main">
                <div class="cl-entry-header">
                  <span class="cl-action cl-action-${c.action}">${c.action}</span>
                  <span class="cl-entity">${entityIcons[c.entity_type]||'◈'} ${clSummary(c)}</span>
                </div>
                ${c.field_changed && c.field_changed !== 'updated_at' ?`<div class="cl-diff"><span class="cl-field">${esc(c.field_changed)}:</span><span class="old">${esc(c.old_value||'—')}</span> <span class="arrow">→</span> <span class="new">${esc(c.new_value||'—')}</span></div>`:''}
              </div>
              <div class="cl-time">${timeAgo(c.timestamp)}<br>${new Date(c.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>
            </div>`).join('')}
        </div>`).join('') : '<div class="empty"><div class="icon"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.3"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg></div><p>No changes logged yet</p></div>'}
    </div>
  `);
}

// ── DRAG & DROP (Kanban) ──────────────────────────────────────
function initKanbanDragDrop(pid) {
  let draggedEl = null;
  let draggedId = null;
  let didDrag = false;

  function clearAllIndicators() {
    document.querySelectorAll('.drop-indicator').forEach(el => el.remove());
    document.querySelectorAll('.k-card.drop-above,.k-card.drop-below').forEach(el => {
      el.classList.remove('drop-above','drop-below');
    });
    document.querySelectorAll('.kanban-col-body.drag-over').forEach(el => {
      el.classList.remove('drag-over');
    });
  }

  // Find the closest card and whether to insert before or after
  function getDropTarget(colBody, y) {
    const cards = Array.from(colBody.querySelectorAll('.k-card:not(.dragging)'));
    if (!cards.length) return { card: null, position: 'append' };
    for (const card of cards) {
      const rect = card.getBoundingClientRect();
      const mid = rect.top + rect.height / 2;
      if (y < mid) return { card, position: 'before' };
    }
    return { card: cards[cards.length - 1], position: 'after' };
  }

  document.querySelectorAll('.kanban .k-card').forEach(card => {
    card.addEventListener('dragstart', e => {
      draggedEl = card;
      draggedId = card.dataset.taskId;
      didDrag = false;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', draggedId);
      requestAnimationFrame(() => { card.style.opacity = '0.3'; });
    });
    card.addEventListener('dragend', e => {
      card.classList.remove('dragging');
      card.style.opacity = '';
      clearAllIndicators();
      draggedEl = null;
      draggedId = null;
    });
    // Suppress click after drag
    card.addEventListener('click', e => {
      if (didDrag) { e.preventDefault(); e.stopPropagation(); didDrag = false; }
    }, true);
  });

  document.querySelectorAll('.kanban .kanban-col-body').forEach(colBody => {
    colBody.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (!draggedEl) return;
      colBody.classList.add('drag-over');

      // Clear previous indicators in all columns
      clearAllIndicators();
      colBody.classList.add('drag-over');

      // Show positional indicator
      const { card, position } = getDropTarget(colBody, e.clientY);
      if (card) {
        if (position === 'before') card.classList.add('drop-above');
        else card.classList.add('drop-below');
      } else {
        // Empty column — show an indicator at the top
        const ind = document.createElement('div');
        ind.className = 'drop-indicator';
        colBody.prepend(ind);
      }
    });

    colBody.addEventListener('dragenter', e => {
      e.preventDefault();
      colBody.classList.add('drag-over');
    });

    colBody.addEventListener('dragleave', e => {
      if (!colBody.contains(e.relatedTarget)) {
        colBody.classList.remove('drag-over');
        clearAllIndicators();
      }
    });

    colBody.addEventListener('drop', async e => {
      e.preventDefault();
      clearAllIndicators();
      const tid = e.dataTransfer.getData('text/plain');
      const newStatus = colBody.dataset.status;
      if (!tid || !newStatus || !draggedEl) return;
      didDrag = true;

      const oldStatus = draggedEl.dataset.status;
      const sameColumn = oldStatus === newStatus;
      const { card: targetCard, position } = getDropTarget(colBody, e.clientY);

      // Move the DOM element to the exact position
      draggedEl.classList.remove('dragging');
      draggedEl.style.opacity = '';
      draggedEl.dataset.status = newStatus;

      if (targetCard) {
        if (position === 'before') {
          colBody.insertBefore(draggedEl, targetCard);
        } else {
          colBody.insertBefore(draggedEl, targetCard.nextSibling);
        }
      } else {
        colBody.appendChild(draggedEl);
      }

      // Save the new order for ALL columns
      const order = getKanbanOrder(pid);
      document.querySelectorAll('.kanban .kanban-col-body').forEach(cb => {
        order[cb.dataset.status] = captureColumnOrder(cb);
      });
      saveKanbanOrder(pid, order);

      // If moved to a different column, update status via API
      if (!sameColumn) {
        const r = await api('PATCH',`/api/projects/${pid}/tasks/${tid}`,{status: newStatus});
        if (r.error) {
          toast(r.error,'err');
          renderTasks(pid);
        } else {
          toast(`Task moved to ${newStatus.replace('_',' ')}`);
          renderTasks(pid);
        }
      } else {
        toast('Order saved');
        // Update counts (no API call needed for reorder)
        document.querySelectorAll('.kanban .kanban-col-body').forEach(cb => {
          const cnt = cb.querySelectorAll('.k-card').length;
          const cntEl = cb.parentElement.querySelector('.cnt');
          if (cntEl) cntEl.textContent = cnt;
        });
      }
    });
  });
}

function initKanbanPanning() {
  const kanban = document.querySelector('.kanban');
  if (!kanban) return;

  let isDown = false;
  let startX;
  let scrollLeft;

  kanban.addEventListener('mousedown', (e) => {
    // Only start panning if clicking background or non-card/non-button elements
    if (e.target.closest('.k-card') || e.target.closest('button') || e.target.closest('select') || e.target.closest('input')) return;
    
    isDown = true;
    kanban.classList.add('panning');
    startX = e.pageX - kanban.offsetLeft;
    scrollLeft = kanban.scrollLeft;
  });

  document.addEventListener('mouseup', () => {
    if (!isDown) return;
    isDown = false;
    kanban.classList.remove('panning');
  });

  document.addEventListener('mousemove', (e) => {
    if (!isDown) return;
    e.preventDefault();
    const x = e.pageX - kanban.offsetLeft;
    const walk = (x - startX) * 1.5; // Scroll speed multiplier
    kanban.scrollLeft = scrollLeft - walk;
  });
}

// ── REAL-TIME EVENTS ──────────────────────────────────────────
function initRealtimeEvents() {
  if (window._sse_init) return;
  window._sse_init = true;
  console.log('📡 Initializing Real-time Events...');
  const source = new EventSource('/api/events');
  source.onmessage = (e) => {
    try {
      const { type, data } = JSON.parse(e.data);
      console.log('🔗 Event Received:', type, data);
      
      if (type === 'task_updated') {
        if (window._pid === data.project_id) {
          updateTaskCardInUI(data);
          // If we also have a changelog feed on screen, we might want to refresh it or wait for changelog event
        }
      } else if (type === 'task_created' || type === 'task_deleted') {
        if (window._pid === data.project_id) {
          if (location.hash.includes('/tasks')) renderTasks(window._pid);
          else loadSidebar(); // just update sidebar counts
        }
      } else if (type === 'changelog_created') {
        if (window._pid === data.project_id || !window._pid) {
          handleRealtimeChangelog(data);
        }
      } else if (type === 'system_change') {
        console.log('🔄 System Change Detect:', data);
        // Toast for visibility
        if (data.tool) toast(`AI via ${data.tool} modified ${data.path}`, 'ok');
        // Refresh sidebar counts
        loadSidebar();
        // If it's the current project, refresh current view
        if (data.path.includes(`/projects/${window._pid}`)) {
          // If we're on a specific page, we might want more targeted refresh
          // But for now, generic route() might be overkill. 
          // Let's just refresh the dashboard part if relevant.
        }
      } else if (type === 'mcp_tool_call') {
        console.log('🤖 MCP Tool Call:', data);
        showMcpIndicator(data.tool, data.method, data.path);
      }
    } catch(err) { console.error('SSE Error:', err); }
  };
  source.onerror = () => {
    console.warn('SSE Connection lost. Reconnecting...');
  };
}

function updateTaskCardInUI(task) {
  const card = document.getElementById(`task-${task.id}`);
  if (!card) {
    // If we're on the tasks page, we might need to add it if it's new
    if (location.hash.includes(`/projects/${task.project_id}/tasks`)) renderTasks(task.project_id);
    return;
  }
  
  // If status changed, we must move it (full re-render is easiest for now to keep order)
  if (card.dataset.status !== task.status) {
    renderTasks(task.project_id);
    return;
  }

  // Update AI status
  const isAiWorking = !!task.is_ai_working;
  const wasAiWorking = card.classList.contains('ai-active');
  
  if (isAiWorking !== wasAiWorking) {
    card.classList.toggle('ai-active', isAiWorking);
    let badge = card.querySelector('.ai-badge');
    if (isAiWorking && !badge) {
      card.insertAdjacentHTML('afterbegin', '<div class="ai-badge"><span></span> AI Working</div>');
    } else if (!isAiWorking && badge) {
      badge.remove();
    }
    // Update the task in memory too
    if (window._tasks) {
      const idx = window._tasks.findIndex(t => t.id === task.id);
      if (idx !== -1) window._tasks[idx] = task;
    }
  }
}

window.toggleFileDiff = async function(el, pid, tid, path) {
  const wrap = el.parentElement;
  const view = wrap.querySelector('.file-diff-view');
  if (view.style.display === '') {
    view.style.display = 'none';
    el.querySelector('span:last-child').style.transform = '';
    return;
  }
  
  if (!view.dataset.loaded) {
    view.innerHTML = '<div style="padding:12px;color:var(--mid);font-size:11px;font-family:var(--mono)">Loading diff...</div>';
    view.style.display = '';
    el.querySelector('span:last-child').style.transform = 'rotate(180deg)';
    
    try {
      const diffs = await api('GET', `/api/projects/${pid}/tasks/${tid}/diff`);
      const item = diffs.find(d => d.path === path);
      if (item && item.diff && item.diff.trim()) {
        const lines = item.diff.split('\n');
        view.innerHTML = `
          <pre style="margin:0;padding:12px;font-size:11px;font-family:var(--mono);line-height:1.6;color:var(--text);white-space:pre-wrap;max-height:400px;overflow-y:auto">` + 
          lines.map(l => {
            if (l.startsWith('+') && !l.startsWith('+++')) return `<div style="color:var(--green);background:rgba(74,222,128,.1);margin:0 -12px;padding:0 12px">${esc(l)}</div>`;
            if (l.startsWith('-') && !l.startsWith('---')) return `<div style="color:var(--rose);background:rgba(251,113,133,.1);margin:0 -12px;padding:0 12px">${esc(l)}</div>`;
            if (l.startsWith('@@')) return `<div style="color:var(--purple);font-weight:700;opacity:.7;margin:0 -12px;padding:0 12px;background:rgba(167,139,250,.05)">${esc(l)}</div>`;
            if (l.startsWith('diff') || l.startsWith('index') || l.startsWith('---') || l.startsWith('+++')) return `<div style="color:var(--dim);margin:0 -12px;padding:0 12px">${esc(l)}</div>`;
            return `<div style="padding:0 12px;margin:0 -12px">${esc(l)}</div>`;
          }).join('') + `</pre>`;
        view.dataset.loaded = 'true';
      } else {
        view.innerHTML = '<div style="padding:12px;color:var(--dim);font-size:11px;font-family:var(--mono)">No changes detected in working tree.</div>';
      }
    } catch(e) {
      view.innerHTML = `<div style="padding:12px;color:var(--rose);font-size:11px;font-family:var(--mono)">Error: ${esc(e.message)}</div>`;
    }
  } else {
    view.style.display = '';
    el.querySelector('span:last-child').style.transform = 'rotate(180deg)';
  }
};

function handleRealtimeChangelog(c) {
  console.log('📜 Real-time Changelog:', c);
  
  // 1. Update Recent Activity feed if it exists
  const feed = document.querySelector('.feed');
  if (feed) {
    const item = document.createElement('div');
    item.className = 'feed-item';
    item.style.animation = 'modalIn .3s ease';
    
    // We need logic to generate the text. We can reuse or simplified.
    const entityIcons = {project:'📁',task:'✅',milestone:'🏁',board:'📋',update:'💬',idea:'💡'};
    const icon = entityIcons[c.entity_type]||'◈';
    
    let summary = `${c.action} ${c.entity_type}`;
    if (c.field_changed) summary += ` — ${c.field_changed}`;
    
    item.innerHTML = `
      <div class="feed-dot dot-${c.action}"></div>
      <div class="feed-body">
        <div class="feed-text"><strong>${c.action}</strong> ${c.entity_type}${c.field_changed?' — '+c.field_changed:''}</div>
        <div class="feed-time">just now</div>
      </div>
    `;
    feed.prepend(item);
    // Remove last if too many
    if (feed.children.length > 15) feed.lastElementChild.remove();
  }

  // 2. Update stats on overview if they are visible
  if (location.hash === `#/projects/${c.project_id}`) {
    // Optionally trigger a full re-render of stats, but let's keep it simple for now
  }
}

let _mcpIndicatorTimeout = null;
function showMcpIndicator(tool, method, path) {
  const container = document.getElementById('mcp-status-container');
  if (!container) return;
  
  // Remove existing if any
  container.innerHTML = '';
  
  const el = document.createElement('div');
  el.className = 'mcp-indicator';
  el.innerHTML = `
    <div class="icon">🤖</div>
    <div class="body">
      <div class="title">AI is thinking...</div>
      <div class="tool">${tool}</div>
    </div>
    <div class="dots"><span></span><span></span><span></span></div>
  `;
  container.appendChild(el);
  
  clearTimeout(_mcpIndicatorTimeout);
  _mcpIndicatorTimeout = setTimeout(() => {
    el.style.transform = 'translateX(100%)';
    el.style.opacity = '0';
    el.style.transition = 'all .4s ease-in';
    setTimeout(() => el.remove(), 400);
  }, 4000);
}

// ── BOOT ─────────────────────────────────────────────────────
(async () => {
  window._pid = null;
  await loadSidebar();
  initRealtimeEvents();
  // If URL is /project/:pid, redirect to hash route
  const m = location.pathname.match(/\/project\/(\d+)/);
  if (m && !location.hash) { location.hash = `#/projects/${m[1]}`; return; }
  // If no hash, default to stored active project or home
  if (!location.hash || location.hash === '#') {
    const ap = getActiveProject();
    location.hash = ap ? `#/projects/${ap.id}` : '#/';
    return;
  }
  route();
})();
