<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard</title>
<link rel="icon" type="image/png" href="/static/logo.png">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
</head>
<body>
<div id="mcp-status-container"></div>
<div class="shell">
  <!-- Topbar -->
  <div class="topbar">
    <a href="/" style="text-decoration:none;color:inherit"><div class="logo"><img src="/static/logo.png" style="height:24px; vertical-align:middle; margin-right:8px;"/> Plano</div></a>
    <div class="breadcrumb" id="breadcrumb"></div>
    <div class="top-nav">
    </div>
  </div>

  <div class="body">
    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
      <a href="#/" id="sn-home" class="nav-item">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:8px"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Dashboard
      </a>
      <a href="#/ideas" id="sn-ideas" class="nav-item">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:8px"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>
        Ideas
      </a>

      <div class="sidebar-hd" style="margin-top:16px">
        Workspaces
        <button class="add-workspace-btn" onclick="openProjectCreateModal()" title="Add Project">+</button>
      </div>
      <div id="sidebar-projects-dropdown" class="workspaces-dropdown">
        <div class="dropdown-trigger" onclick="toggleWorkspaces()">
          <span id="active-workspace-name">Select Workspace</span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
        </div>
        <div id="workspaces-list" class="dropdown-content"></div>
      </div>

      <div id="sidebar-subnav" class="sidebar-subnav" style="display:none">
        <!-- Project-specific links rendered here -->
      </div>
      
      <div class="sidebar-footer">
        <a href="https://github.com/nopan-studio/plano" target="_blank" class="github-card">
          <span class="github-logo">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.041-1.416-4.041-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
          </span>
          <span class="gh-label">Contribute</span>
        </a>
      </div>
    </nav>

    <!-- Main -->
    <div class="main" id="main-view"></div>
  </div>
</div>
<div id="toast"></div>
<div id="detail-modal-root"></div>


<script src="/static/js/dashboard/api.js?v=3"></script>
<script src="/static/js/dashboard/utils.js?v=3"></script>
<script src="/static/js/dashboard/router.js?v=3"></script>
<script src="/static/js/dashboard/sidebar.js?v=3"></script>
<script src="/static/js/dashboard/kanban.js?v=3"></script>
<script src="/static/js/dashboard/pages/home.js?v=3"></script>
<script src="/static/js/dashboard/pages/project.js?v=3"></script>
<script src="/static/js/dashboard/pages/tasks.js?v=3"></script>
<script src="/static/js/dashboard/pages/archive.js?v=3"></script>
<script src="/static/js/dashboard/pages/milestones.js?v=3"></script>
<script src="/static/js/dashboard/pages/changelog.js?v=3"></script>
<script src="/static/js/dashboard/pages/updates.js?v=3"></script>
<script src="/static/js/dashboard/pages/ideas.js?v=3"></script>
<script src="/static/js/dashboard/pages/boards.js?v=3"></script>
<script src="/static/js/dashboard/app.js?v=3"></script>
</body>
</html>
