<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Plano PM</title>
<link rel="icon" type="image/png" href="/static/logo.png">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/dashboard.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
</head>
<body>
<div id="mcp-status-container"></div>
<div class="shell">
  <!-- Topbar -->
  <div class="topbar">
    <div class="logo"><img src="/static/logo.png" style="height:24px; vertical-align:middle; margin-right:8px;"/> Plano</div>
    <div class="breadcrumb" id="breadcrumb"></div>
    <div class="top-nav">
      <a href="/tester">API Tester</a>
    </div>
  </div>

  <div class="body">
    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar-hd">Workspace</div>
      <a href="#/" id="sn-home">🏠 Overview</a>
      <a href="#/ideas" id="sn-ideas">💡 All Ideas</a>
      <div class="sidebar-hd" style="margin-top:8px">Projects</div>
      <div id="sidebar-projects"></div>
    </nav>

    <!-- Main -->
    <div class="main" id="main-view"></div>
  </div>
</div>
<div id="toast"></div>
<div id="detail-modal-root"></div>

<script>
const B = window.location.origin;
let _projects = [];
let _activeProject = null; // {id, name}

// ── API ───────────────────────────────────────────────────────
async function api(method, path, body=null) {
  const opts = {method, headers:{'Content-Type':'application/json'}};
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(B + path, opts);
  return r.json();
}

function toast(msg, cls='ok') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = cls+' show';
  setTimeout(()=>t.className='', 2600);
}

function esc(s) { const d=document.createElement('div'); d.textContent=String(s??''); return d.innerHTML; }
function md(s) {
  // basic markdown: **bold**, *italic*, `code`, newlines
  return esc(s)
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\n/g,'<br>');
}

function fmtDate(s) { return s ? new Date(s).toLocaleDateString() : '—'; }
function timeAgo(s) {
  const d = (Date.now() - new Date(s)) / 1000;
  if (d < 60) return 'just now';
  if (d < 3600) return Math.floor(d/60) + 'm ago';
  if (d < 86400) return Math.floor(d/3600) + 'h ago';
  return Math.floor(d/86400) + 'd ago';
}

function renderFilesMeta(files, pid, tid) {
  if (!files || !files.length) return '';
  const list = typeof files === 'string' ? JSON.parse(files) : files;
  if (!list.length) return '';
  const canDiff = pid && tid && tid !== -1;
  return `
    <div class="dm-section">
      <div class="dm-section-label">Files Affected</div>
      <div class="file-list">
        ${list.map(f => `
          <div class="file-item-wrap">
            <div class="file-item" ${canDiff ? `onclick="toggleFileDiff(this, ${pid}, ${tid}, '${esc(f.path)}')"` : ''}>
              <span class="file-action fa-${f.action}">${f.action}</span>
              <span class="file-path">${esc(f.path)}</span>
              ${canDiff ? `<span style="font-size:10px;color:var(--dim);opacity:.5">▼</span>` : ''}
            </div>
            <div class="file-diff-view" style="display:none;background:var(--bg);margin-top:-2px;border:1px solid var(--b2);border-radius:0 0 var(--r) var(--r);overflow:hidden"></div>
          </div>
        `).join('')}
      </div>
    </div>`;
}

// ── localStorage active project ───────────────────────────────
function setActiveProject(p) {
  _activeProject = p;
  if (p) localStorage.setItem('fmc_active_project', JSON.stringify(p));
  else localStorage.removeItem('fmc_active_project');
}
function getActiveProject() {
  try { return JSON.parse(localStorage.getItem('fmc_active_project')); } catch { return null; }
}

// ── Router ────────────────────────────────────────────────────
function route() {
  const hash = location.hash || '#/';
  const m = {
    home:  hash === '#/' || hash === '',
    ideas: hash === '#/ideas',
    proj:  hash.match(/^#\/projects\/(\d+)$/),
    tasks: hash.match(/^#\/projects\/(\d+)\/tasks$/),
    milestones: hash.match(/^#\/projects\/(\d+)\/milestones$/),
    changelog:  hash.match(/^#\/projects\/(\d+)\/changelog$/),
    updates:    hash.match(/^#\/projects\/(\d+)\/updates$/),
    pideas:     hash.match(/^#\/projects\/(\d+)\/ideas$/),
    boards:     hash.match(/^#\/projects\/(\d+)\/boards$/),
  };
  if      (m.home)       renderHome();
  else if (m.ideas)      renderAllIdeas();
  else if (m.tasks)      renderTasks(+m.tasks[1]);
  else if (m.milestones) renderMilestones(+m.milestones[1]);
  else if (m.changelog)  renderChangelog(+m.changelog[1]);
  else if (m.updates)    renderUpdates(+m.updates[1]);
  else if (m.pideas)     renderIdeas(+m.pideas[1]);
  else if (m.boards)     renderBoards(+m.boards[1]);
  else if (m.proj)       renderProject(+m.proj[1]);
  else                   renderHome();
}
window.addEventListener('hashchange', route);

// ── Sidebar ───────────────────────────────────────────────────
async function loadSidebar() {
  _projects = await api('GET', '/api/projects');
  const el = document.getElementById('sidebar-projects');
  el.innerHTML = _projects.map(p =>
    `<a href="#/projects/${p.id}" data-pid="${p.id}">${esc(p.name)}
      <span class="badge">${p.task_count||0}</span>
    </a>`
  ).join('');
  // highlight active
  document.querySelectorAll('.sidebar a').forEach(a => {
    a.classList.toggle('act', a.getAttribute('href') === location.hash || (location.hash===''&&a.getAttribute('href')==='#/'));
  });
}

function setBreadcrumb(items) {
  const el = document.getElementById('breadcrumb');
  el.innerHTML = items.map((it,i) =>
    i < items.length-1
      ? `<a href="${it.href||'#/'}">${esc(it.label)}</a><span class="sep">›</span>`
      : `<span>${esc(it.label)}</span>`
  ).join('');
}
function setSidebarActive(href) {
  document.querySelectorAll('.sidebar a').forEach(a =>
    a.classList.toggle('act', a.getAttribute('href') === href));
}

// ── Helpers ───────────────────────────────────────────────────
function view(html) {
  return new Promise(resolve => {
    if (document.startViewTransition) {
      document.startViewTransition(() => {
        document.getElementById('main-view').innerHTML = html;
        resolve();
      });
    } else {
      document.getElementById('main-view').innerHTML = html;
      resolve();
    }
  });
}

function projectNavTabs(pid, active) {
  const tabs = [
    ['Overview','#/projects/'+pid],
    ['Tasks','#/projects/'+pid+'/tasks'],
    ['Milestones','#/projects/'+pid+'/milestones'],
    ['Updates','#/projects/'+pid+'/updates'],
    ['Changelog','#/projects/'+pid+'/changelog'],
    ['Ideas','#/projects/'+pid+'/ideas'],
    ['Boards','#/projects/'+pid+'/boards'],
  ];
  return `<div class="tabs">${tabs.map(([l,h])=>
    `<a class="tab${active===l?' act':''}" href="${h}">${l}</a>`
  ).join('')}</div>`;
}

// ── HOME ──────────────────────────────────────────────────────
async function renderHome() {
  setBreadcrumb([{label:'Overview'}]);
  setSidebarActive('#/');
  await loadSidebar();
  const projects = _projects;

  const totalTasks = projects.reduce((s,p)=>s+(p.task_count||0),0);
  const totalActive = projects.filter(p=>p.status==='active').length;
  const totalDone = projects.filter(p=>p.status==='completed').length;

  view(`
    <div class="page-hd">
      <div><h1>Overview</h1><div class="sub">${projects.length} projects</div></div>
      <button class="btn btn-acc btn-sm" style="margin-left:auto" onclick="showCreateProject()">+ New Project</button>
    </div>
    <div class="stat-row">
      <div class="stat"><div class="stat-v">${projects.length}</div><div class="stat-l">Projects</div></div>
      <div class="stat"><div class="stat-v">${totalActive}</div><div class="stat-l">Active</div></div>
      <div class="stat"><div class="stat-v">${totalDone}</div><div class="stat-l">Completed</div></div>
      <div class="stat"><div class="stat-v">${totalTasks}</div><div class="stat-l">Total Tasks</div></div>
    </div>
    <div id="create-project-form" style="display:none" class="form-card">
      <h3>New Project</h3>
      <div class="form-row">
        <input id="pf-name" type="text" placeholder="Project name" style="flex:2">
        <select id="pf-priority" style="flex:1;background:var(--surf);border:1px solid var(--b2);border-radius:var(--r);color:var(--text);font-family:var(--sans);font-size:13px;padding:7px 10px">
          <option value="low">Low</option><option value="medium" selected>Medium</option>
          <option value="high">High</option><option value="critical">Critical</option>
        </select>
      </div>
      <div class="form-row"><input id="pf-desc" type="text" placeholder="Description (optional)"></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-acc btn-sm" onclick="createProject()">Create</button>
        <button class="btn btn-out btn-sm" onclick="document.getElementById('create-project-form').style.display='none'">Cancel</button>
      </div>
    </div>
    <div class="cards" id="project-cards">
      ${projects.length ? projects.map(p => `
        <div class="card" onclick="location.hash='#/projects/${p.id}'">
          <div class="card-title">${esc(p.name)}</div>
          <div class="card-desc">${esc(p.description||'No description')}</div>
          <div class="card-meta">
            <span class="badge s-${p.status}">${p.status}</span>
            <span class="badge p-${p.priority}">● ${p.priority}</span>
            <span style="font-size:11px;color:var(--dim);font-family:var(--mono);margin-left:auto">${p.task_count||0} tasks</span>
          </div>
          <div class="prog"><div class="prog-bar" style="width:${p.progress_pct||0}%"></div></div>
        </div>
      `).join('') : '<div class="empty"><div class="icon">📁</div><p>No projects yet. Create one above.</p></div>'}
    </div>
  `);
}

function showCreateProject() {
  const f = document.getElementById('create-project-form');
  if (f) f.style.display = f.style.display==='none' ? '' : 'none';
}
async function createProject() {
  const name = document.getElementById('pf-name').value.trim();
  if (!name) return toast('Name required','err');
  const data = await api('POST','/api/projects',{
    name, priority:document.getElementById('pf-priority').value,
    description:document.getElementById('pf-desc').value.trim(), status:'planning'
  });
  if (data.error) return toast(data.error,'err');
  toast('Project created!');
  await loadSidebar();
  location.hash = '#/projects/'+data.id;
}

// ── PROJECT OVERVIEW ──────────────────────────────────────────
async function renderProject(pid) {
  const [proj, dash, tasks, milestones] = await Promise.all([
    api('GET',`/api/projects/${pid}`),
    api('GET',`/api/projects/${pid}/dashboard`),
    api('GET',`/api/projects/${pid}/tasks`),
    api('GET',`/api/projects/${pid}/milestones`),
  ]);
  setActiveProject({id:pid, name:proj.name});
  window._pid = pid;
  setBreadcrumb([{label:'Overview',href:'#/'},{label:proj.name}]);
  setSidebarActive(`#/projects/${pid}`);

  const byStatus = dash.tasks_by_status || {};
  view(`
    <div class="page-hd">
      <div>
        <h1>${esc(proj.name)}</h1>
        <div class="sub">${esc(proj.description||'')}</div>
      </div>
      <div style="display:flex;gap:8px;margin-left:auto;align-items:center">
        <span class="badge s-${proj.status}">${proj.status}</span>
        <span class="badge p-${proj.priority}">● ${proj.priority}</span>
        <button class="btn btn-ghost btn-sm" onclick="deleteProject(${pid})" title="Delete project">🗑</button>
      </div>
    </div>
    ${projectNavTabs(pid,'Overview')}
    <div class="stat-row">
      <div class="stat"><div class="stat-v">${dash.tasks_total}</div><div class="stat-l">Tasks</div></div>
      <div class="stat"><div class="stat-v">${byStatus.done||0}</div><div class="stat-l">Done</div></div>
      <div class="stat"><div class="stat-v">${byStatus.in_progress||0}</div><div class="stat-l">In Progress</div></div>
      <div class="stat"><div class="stat-v">${dash.milestones_total}</div><div class="stat-l">Milestones</div></div>
      <div class="stat"><div class="stat-v">${dash.boards_total}</div><div class="stat-l">Boards</div></div>
      <div class="stat"><div class="stat-v">${proj.progress_pct||0}%</div><div class="stat-l">Progress</div></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div>
        <div class="section-hd">Project Details</div>
        <div class="form-card">
          <div class="dm-field-row">
            <div class="dm-field">
              <label>Status</label>
              <select id="p-status" onchange="patchProject(${pid},{status:this.value})">${['planning','active','on_hold','completed','archived'].map(s=>`<option value="${s}"${proj.status===s?' selected':''}>${s}</option>`).join('')}</select>
            </div>
            <div class="dm-field">
              <label>Priority</label>
              <select id="p-priority" onchange="patchProject(${pid},{priority:this.value})">${['low','medium','high','critical'].map(p=>`<option value="${p}"${proj.priority===p?' selected':''}>${p}</option>`).join('')}</select>
            </div>
          </div>
          <div class="dm-field-row">
            <div class="dm-field">
              <label>Progress (%)</label>
              <input type="number" value="${proj.progress_pct||0}" min="0" max="100" onchange="patchProject(${pid},{progress_pct:+this.value})">
            </div>
            <div class="dm-field">
              <label>Target Date</label>
              <input type="date" value="${proj.target_date||''}" onchange="patchProject(${pid},{target_date:this.value})">
            </div>
          </div>
          <button class="btn btn-out btn-sm" style="width:100%;margin-top:8px" onclick="openProjectEditModal(${pid})">✏️ Full Edit</button>
        </div>

        <div class="section-hd">Integrations & Portability</div>
        <div class="form-card">
          <div style="display:flex;gap:8px;margin-bottom:12px">
            <button class="btn btn-out btn-sm" style="flex:1" onclick="exportProject(${pid})">📤 Export Project</button>
            <button class="btn btn-out btn-sm" style="flex:1" onclick="document.getElementById('import-input').click()">📥 Import Over...</button>
            <input type="file" id="import-input" style="display:none" onchange="importProject(this)">
          </div>

        </div>

        <div class="section-hd">Milestones</div>
        ${milestones.length ? milestones.slice(0,5).map(m=>`
          <div class="feed-item" style="margin-bottom:6px">
            <div class="feed-dot dot-${m.status==='completed'?'created':m.status==='missed'?'deleted':'updated'}"></div>
            <div class="feed-body">
              <div class="feed-text"><strong>${esc(m.name)}</strong></div>
              <div class="feed-time"><span class="badge s-${m.status}">${m.status}</span> ${m.due_date?'Due '+fmtDate(m.due_date):''}</div>
            </div>
          </div>`).join('') : '<div class="empty" style="padding:20px"><p>No milestones</p></div>'}
        <a href="#/projects/${pid}/milestones" style="font-size:12px;color:var(--acc)">View all milestones →</a>
      </div>
      <div>
        <div class="section-hd">Recent Activity</div>
        <div class="feed">
          ${dash.recent_changes.slice(0,8).map(c=>`
            <div class="feed-item">
              <div class="feed-dot dot-${c.action}"></div>
              <div class="feed-body">
                <div class="feed-text"><strong>${c.action}</strong> ${c.entity_type}${c.field_changed?' — '+c.field_changed:''}</div>
                <div class="feed-time">${timeAgo(c.timestamp)}</div>
              </div>
            </div>`).join('') || '<div style="color:var(--dim);font-size:13px">No activity yet</div>'}
        </div>
      </div>
    </div>
  `);
}
window.deleteProject = async function(pid) {
  if (!confirm('Delete this project and all its data?')) return;
  await api('DELETE',`/api/projects/${pid}`);
  setActiveProject(null);
  toast('Project deleted');
  await loadSidebar();
  location.hash = '#/';
}

window.patchProject = async function(pid, data) {
  const r = await api('PATCH', `/api/projects/${pid}`, data);
  if (r.error) return toast(r.error, 'err');
  toast('Project updated');
  renderProject(pid);
};

window.openProjectEditModal = async function(pid) {
  const p = await api('GET', `/api/projects/${pid}`);
  document.getElementById('detail-modal-root').innerHTML = `
    <div class="detail-overlay" onclick="if(event.target===this)closeDetailModal()">
      <div class="detail-modal">
        <div class="dm-header">
          <div class="dm-header-icon">📁</div>
          <div class="dm-header-body">
            <h2>Edit Project</h2>
            <div class="dm-meta"><span class="badge s-${p.status}">${p.status}</span></div>
          </div>
          <button class="dm-close" onclick="closeDetailModal()">✕</button>
        </div>
        <div class="dm-body">
          <div class="dm-section">
            <label class="dm-section-label">Project Name</label>
            <input type="text" id="pm-name" value="${esc(p.name)}">
          </div>
          <div class="dm-section">
            <label class="dm-section-label">Description</label>
            <textarea id="pm-desc">${esc(p.description||'')}</textarea>
          </div>
        </div>
        <div class="dm-footer">
          <button class="btn btn-out btn-sm" onclick="closeDetailModal()">Cancel</button>
          <button class="btn btn-acc btn-sm" onclick="saveProjectDetail(${pid})">Save Changes</button>
        </div>
      </div>
    </div>`;
};

window.saveProjectDetail = async function(pid) {
  const body = {
    name: document.getElementById('pm-name').value.trim(),
    description: document.getElementById('pm-desc').value.trim()
  };
  const r = await api('PATCH', `/api/projects/${pid}`, body);
  if (r.error) return toast(r.error, 'err');
  toast('Project updated'); closeDetailModal(); renderProject(pid);
};

window.exportProject = async function(pid) {
  const data = await api('GET', `/api/projects/${pid}/export`);
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `project_${pid}_export.json`;
  a.click();
  toast('Project exported');
};

window.importProject = async function(input) {
  const file = input.files[0];
  if (!file) return;
  const text = await file.text();
  try {
    const data = JSON.parse(text);
    const r = await api('POST', '/api/projects/import', data);
    if (r.error) return toast(r.error, 'err');
    toast('Project imported successfully');
    await loadSidebar();
    location.hash = '#/projects/' + r.id;
  } catch(e) { toast('Invalid JSON file', 'err'); }
};



// ── TASKS ─────────────────────────────────────────────────────
async function renderTasks(pid) {
  const [proj, tasks, milestones] = await Promise.all([
    api('GET',`/api/projects/${pid}`),
    api('GET',`/api/projects/${pid}/tasks`),
    api('GET',`/api/projects/${pid}/milestones`),
  ]);
  setActiveProject({id:pid,name:proj.name});
  setBreadcrumb([{label:'Overview',href:'#/'},{label:proj.name,href:`#/projects/${pid}`},{label:'Tasks'}]);
  setSidebarActive(`#/projects/${pid}`);
  const msOpts = milestones.map(m=>`<option value="${m.id}">${esc(m.name)}</option>`).join('');
  window._tasks = tasks; window._milestones = milestones;

  // Apply saved order from localStorage
  const savedOrder = getKanbanOrder(pid);
  function sortByOrder(arr, status) {
    const order = savedOrder[status] || [];
    if (!order.length) return arr;
    return arr.slice().sort((a, b) => {
      const ia = order.indexOf(a.id), ib = order.indexOf(b.id);
      if (ia === -1 && ib === -1) return 0;
      if (ia === -1) return 1;
      if (ib === -1) return -1;
      return ia - ib;
    });
  }
  const todo = sortByOrder(tasks.filter(t=>t.status==='todo'), 'todo');
  const progress = sortByOrder(tasks.filter(t=>t.status==='in_progress'), 'in_progress');
  const review = sortByOrder(tasks.filter(t=>t.status==='review'), 'review');
  const done = sortByOrder(tasks.filter(t=>t.status==='done'), 'done');
  const bugs = sortByOrder(tasks.filter(t=>t.status==='bugs'), 'bugs');

  function kCard(t) {
    const pColor = {low:'var(--dim)',medium:'var(--blue)',high:'var(--amber)',critical:'var(--rose)'}[t.priority]||'var(--dim)';
    const ms = (milestones||[]).find(m=>m.id===t.milestone_id);
    const aiActive = t.is_ai_working ? ' ai-active' : '';
    const aiBadge = t.is_ai_working ? '<div class="ai-badge"><span></span> AI Working</div>' : '';
    return `<div class="k-card${aiActive}" id="task-${t.id}" style="view-transition-name: task-card-${t.id}" draggable="true" data-task-id="${t.id}" data-status="${t.status}" onclick="openTaskDetail(${pid},${t.id})">
      ${aiBadge}
      <div class="k-card-title">${esc(t.title)}</div>
      ${t.description?`<div class="k-card-sub">${esc(t.description)}</div>`:''}
      <div class="k-card-chips">
        <span class="chip" style="color:${pColor};background:var(--surf2)">● ${t.priority}</span>
        ${t.assignee?`<span class="chip chip-assignee">👤 ${esc(t.assignee)}</span>`:''}
        ${t.due_date?`<span class="chip chip-due">📅 ${fmtDate(t.due_date)}</span>`:''}
        ${ms?`<span class="chip chip-ms">🏁 ${esc(ms.name)}</span>`:''}
      </div>
    </div>`;
  }

  await view(`
    <div class="page-hd"><h1>Tasks</h1>
      <div style="margin-left:auto">
        <button class="btn btn-acc btn-sm" onclick="toggleTaskForm(${pid})">+ Add Task</button>
      </div>
    </div>
    ${projectNavTabs(pid,'Tasks')}
    <div id="task-form" class="form-card" style="display:none;margin-bottom:14px">
      <h3>New Task</h3>
      <div class="form-row">
        <input id="tf-title" type="text" placeholder="Task title" style="flex:3">
        <input id="tf-assignee" type="text" placeholder="Assignee" style="flex:1">
      </div>
      <div class="form-row">
        <select id="tf-priority" style="flex:1;background:var(--surf);border:1px solid var(--b2);border-radius:var(--r);color:var(--text);font-family:var(--sans);font-size:13px;padding:7px 10px">
          <option value="low">Low</option><option value="medium" selected>Medium</option><option value="high">High</option><option value="critical">Critical</option>
        </select>

// ── CHANGELOG ─────────────────────────────────────────────────
async function renderChangelog(pid) {
  const [proj, cl, tasks, milestones, boards] = await Promise.all([
    api('GET',`/api/projects/${pid}`),
    api('GET',`/api/projects/${pid}/changelog?per_page=100`),
    api('GET',`/api/projects/${pid}/tasks`),
    api('GET',`/api/projects/${pid}/milestones`),
    api('GET',`/api/projects/${pid}/boards`),
  ]);
  setActiveProject({id:pid,name:proj.name});
  setBreadcrumb([{label:'Overview',href:'#/'},{label:proj.name,href:`#/projects/${pid}`},{label:'Changelog'}]);
  window._recent_changelog = cl.entries;

  // Build name lookup maps
  const nameMap = {project:{}, task:{}, milestone:{}, board:{}, update:{}, idea:{}};
  nameMap.project[pid] = proj.name;
  (tasks||[]).forEach(t => nameMap.task[t.id] = t.title);
  (milestones||[]).forEach(m => nameMap.milestone[m.id] = m.name);
  (boards||[]).forEach(b => nameMap.board[b.id] = b.name);
  window._cl_name_map = nameMap;
  function entityName(type, id) {
    return (nameMap[type] && nameMap[type][id]) || `${type} #${id}`;
  }

  // Group by calendar day
  const grouped = {};
  cl.entries.forEach(c => {
    const day = new Date(c.timestamp).toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
    (grouped[day] = grouped[day]||[]).push(c);
  });
  const entityIcons = {project:'📁',task:'✅',milestone:'🏁',board:'📋',update:'💬',idea:'💡'};

  function clSummary(c) {
    const name = entityName(c.entity_type, c.entity_id);
    if (c.action === 'created') return `Created <strong>${esc(c.entity_type)}</strong>: ${esc(name)}`;
    if (c.action === 'deleted') return `Deleted <strong>${esc(c.entity_type)}</strong>: ${esc(name)}`;
    if (c.field_changed === 'updated_at') return `Updated <strong>${esc(name)}</strong>`;
    if (c.field_changed) return `Changed <strong>${esc(c.field_changed)}</strong> on ${esc(name)}`;
    return `${c.action} ${esc(c.entity_type)}: ${esc(name)}`;
  }

  view(`
    <div class="page-hd"><h1>Changelog</h1>
      <span style="font-size:12px;color:var(--mid);margin-left:auto;font-family:var(--mono)">${cl.total} entries</span>
    </div>
    ${projectNavTabs(pid,'Changelog')}
    <div class="prose-wrap">
      ${Object.keys(grouped).length ? Object.entries(grouped).map(([day,entries])=>`
        <div class="cl-day">
          <div class="cl-day-label"><span>${day}</span></div>
          ${entries.map(c=>`
            <div class="cl-entry act-${c.action}" style="cursor:pointer" onclick="openChangelogDetail(window._recent_changelog.find(x=>x.id===${c.id}))">
              <div class="cl-entry-main">
                <div class="cl-entry-header">
                  <span class="cl-action cl-action-${c.action}">${c.action}</span>
                  <span class="cl-entity">${entityIcons[c.entity_type]||'◈'} ${clSummary(c)}</span>
                </div>
                ${c.field_changed && c.field_changed !== 'updated_at' ?`<div class="cl-diff"><span class="cl-field">${esc(c.field_changed)}:</span><span class="old">${esc(c.old_value||'—')}</span> <span class="arrow">→</span> <span class="new">${esc(c.new_value||'—')}</span></div>`:''}
              </div>
              <div class="cl-time">${timeAgo(c.timestamp)}<br>${new Date(c.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>
            </div>`).join('')}
        </div>`).join('') : '<div class="empty"><div class="icon">📜</div><p>No changes logged yet</p></div>'}
    </div>
  `);
}

  return Array.from(colBody.querySelectorAll('.k-card')).map(c => +c.dataset.taskId);
}

// ── DRAG & DROP (Kanban) ──────────────────────────────────────
function initKanbanDragDrop(pid) {
  let draggedEl = null;
  let draggedId = null;
  let didDrag = false;

  function clearAllIndicators() {
    document.querySelectorAll('.drop-indicator').forEach(el => el.remove());
    document.querySelectorAll('.k-card.drop-above,.k-card.drop-below').forEach(el => {
      el.classList.remove('drop-above','drop-below');
    });
    document.querySelectorAll('.kanban-col-body.drag-over').forEach(el => {
      el.classList.remove('drag-over');
    });
  }

  // Find the closest card and whether to insert before or after
  function getDropTarget(colBody, y) {
    const cards = Array.from(colBody.querySelectorAll('.k-card:not(.dragging)'));
    if (!cards.length) return { card: null, position: 'append' };
    for (const card of cards) {
      const rect = card.getBoundingClientRect();
      const mid = rect.top + rect.height / 2;
      if (y < mid) return { card, position: 'before' };
    }
    return { card: cards[cards.length - 1], position: 'after' };
  }

  document.querySelectorAll('.kanban .k-card').forEach(card => {
    card.addEventListener('dragstart', e => {
      draggedEl = card;
      draggedId = card.dataset.taskId;
      didDrag = false;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', draggedId);
      requestAnimationFrame(() => { card.style.opacity = '0.3'; });
    });
    card.addEventListener('dragend', e => {
      card.classList.remove('dragging');
      card.style.opacity = '';
      clearAllIndicators();
      draggedEl = null;
      draggedId = null;
    });
    // Suppress click after drag
    card.addEventListener('click', e => {
      if (didDrag) { e.preventDefault(); e.stopPropagation(); didDrag = false; }
    }, true);
  });

  document.querySelectorAll('.kanban .kanban-col-body').forEach(colBody => {
    colBody.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (!draggedEl) return;
      colBody.classList.add('drag-over');

      // Clear previous indicators in all columns
      clearAllIndicators();
      colBody.classList.add('drag-over');

      // Show positional indicator
      const { card, position } = getDropTarget(colBody, e.clientY);
      if (card) {
        if (position === 'before') card.classList.add('drop-above');
        else card.classList.add('drop-below');
      } else {
        // Empty column — show an indicator at the top
        const ind = document.createElement('div');
        ind.className = 'drop-indicator';
        colBody.prepend(ind);
      }
    });

    colBody.addEventListener('dragenter', e => {
      e.preventDefault();
      colBody.classList.add('drag-over');
    });

    colBody.addEventListener('dragleave', e => {
      if (!colBody.contains(e.relatedTarget)) {
        colBody.classList.remove('drag-over');
        clearAllIndicators();
      }
    });

    colBody.addEventListener('drop', async e => {
      e.preventDefault();
      clearAllIndicators();
      const tid = e.dataTransfer.getData('text/plain');
      const newStatus = colBody.dataset.status;
      if (!tid || !newStatus || !draggedEl) return;
      didDrag = true;

      const oldStatus = draggedEl.dataset.status;
      const sameColumn = oldStatus === newStatus;
      const { card: targetCard, position } = getDropTarget(colBody, e.clientY);

      // Move the DOM element to the exact position
      draggedEl.classList.remove('dragging');
      draggedEl.style.opacity = '';
      draggedEl.dataset.status = newStatus;

      if (targetCard) {
        if (position === 'before') {
          colBody.insertBefore(draggedEl, targetCard);
        } else {
          colBody.insertBefore(draggedEl, targetCard.nextSibling);
        }
      } else {
        colBody.appendChild(draggedEl);
      }

      // Save the new order for ALL columns
      const order = getKanbanOrder(pid);
      document.querySelectorAll('.kanban .kanban-col-body').forEach(cb => {
        order[cb.dataset.status] = captureColumnOrder(cb);
      });
      saveKanbanOrder(pid, order);

      // If moved to a different column, update status via API
      if (!sameColumn) {
        const r = await api('PATCH',`/api/projects/${pid}/tasks/${tid}`,{status: newStatus});
        if (r.error) {
          toast(r.error,'err');
          renderTasks(pid);
        } else {
          toast(`Task moved to ${newStatus.replace('_',' ')}`);
          renderTasks(pid);
        }
      } else {
        toast('Order saved');
        // Update counts (no API call needed for reorder)
        document.querySelectorAll('.kanban .kanban-col-body').forEach(cb => {
          const cnt = cb.querySelectorAll('.k-card').length;
          const cntEl = cb.parentElement.querySelector('.cnt');
          if (cntEl) cntEl.textContent = cnt;
        });
      }
    });
  });
}

function initKanbanPanning() {
  const kanban = document.querySelector('.kanban');
  if (!kanban) return;

  let isDown = false;
  let startX;
  let scrollLeft;

  kanban.addEventListener('mousedown', (e) => {
    // Only start panning if clicking background or non-card/non-button elements
    if (e.target.closest('.k-card') || e.target.closest('button') || e.target.closest('select') || e.target.closest('input')) return;
    
    isDown = true;
    kanban.classList.add('panning');
    startX = e.pageX - kanban.offsetLeft;
    scrollLeft = kanban.scrollLeft;
  });

  document.addEventListener('mouseup', () => {
    if (!isDown) return;
    isDown = false;
    kanban.classList.remove('panning');
  });

  document.addEventListener('mousemove', (e) => {
    if (!isDown) return;
    e.preventDefault();
    const x = e.pageX - kanban.offsetLeft;
    const walk = (x - startX) * 1.5; // Scroll speed multiplier
    kanban.scrollLeft = scrollLeft - walk;
  });
}

// ── REAL-TIME EVENTS ──────────────────────────────────────────
function initRealtimeEvents() {
  if (window._sse_init) return;
  window._sse_init = true;
  console.log('📡 Initializing Real-time Events...');
  const source = new EventSource('/api/events');
  source.onmessage = (e) => {
    try {
      const { type, data } = JSON.parse(e.data);
      console.log('🔗 Event Received:', type, data);
      
      if (type === 'task_updated') {
        if (window._pid === data.project_id) {
          updateTaskCardInUI(data);
          // If we also have a changelog feed on screen, we might want to refresh it or wait for changelog event
        }
      } else if (type === 'task_created' || type === 'task_deleted') {
        if (window._pid === data.project_id) {
          renderTasks(window._pid);
        }
      } else if (type === 'changelog_created') {
        if (window._pid === data.project_id || !window._pid) {
          handleRealtimeChangelog(data);
        }
      } else if (type === 'system_change') {
        console.log('🔄 System Change Detect:', data);
        // Toast for visibility
        if (data.tool) toast(`AI via ${data.tool} modified ${data.path}`, 'ok');
        // Refresh sidebar counts
        loadSidebar();
        // If it's the current project, refresh current view
        if (data.path.includes(`/projects/${window._pid}`)) {
          // If we're on a specific page, we might want more targeted refresh
          // But for now, generic route() might be overkill. 
          // Let's just refresh the dashboard part if relevant.
        }
      } else if (type === 'mcp_tool_call') {
        console.log('🤖 MCP Tool Call:', data);
        showMcpIndicator(data.tool, data.method, data.path);
      }
    } catch(err) { console.error('SSE Error:', err); }
  };
  source.onerror = () => {
    console.warn('SSE Connection lost. Reconnecting...');
  };
}

function updateTaskCardInUI(task) {
  const card = document.getElementById(`task-${task.id}`);
  if (!card) {
    // If we're on the tasks page, we might need to add it if it's new
    if (location.hash.includes(`/projects/${task.project_id}/tasks`)) renderTasks(task.project_id);
    return;
  }
  
  // If status changed, we must move it (full re-render is easiest for now to keep order)
  if (card.dataset.status !== task.status) {
    renderTasks(task.project_id);
    return;
  }

  // Update AI status
  const isAiWorking = !!task.is_ai_working;
  const wasAiWorking = card.classList.contains('ai-active');
  
  if (isAiWorking !== wasAiWorking) {
    card.classList.toggle('ai-active', isAiWorking);
    let badge = card.querySelector('.ai-badge');
    if (isAiWorking && !badge) {
      card.insertAdjacentHTML('afterbegin', '<div class="ai-badge"><span></span> AI Working</div>');
    } else if (!isAiWorking && badge) {
      badge.remove();
    }
    // Update the task in memory too
    if (window._tasks) {
      const idx = window._tasks.findIndex(t => t.id === task.id);
      if (idx !== -1) window._tasks[idx] = task;
    }
  }
}

window.toggleFileDiff = async function(el, pid, tid, path) {
  const wrap = el.parentElement;
  const view = wrap.querySelector('.file-diff-view');
  if (view.style.display === '') {
    view.style.display = 'none';
    el.querySelector('span:last-child').style.transform = '';
    return;
  }
  
  if (!view.dataset.loaded) {
    view.innerHTML = '<div style="padding:12px;color:var(--mid);font-size:11px;font-family:var(--mono)">Loading diff...</div>';
    view.style.display = '';
    el.querySelector('span:last-child').style.transform = 'rotate(180deg)';
    
    try {
      const diffs = await api('GET', `/api/projects/${pid}/tasks/${tid}/diff`);
      const item = diffs.find(d => d.path === path);
      if (item && item.diff && item.diff.trim()) {
        const lines = item.diff.split('\n');
        view.innerHTML = `
          <pre style="margin:0;padding:12px;font-size:11px;font-family:var(--mono);line-height:1.6;color:var(--text);white-space:pre-wrap;max-height:400px;overflow-y:auto">` + 
          lines.map(l => {
            if (l.startsWith('+') && !l.startsWith('+++')) return `<div style="color:var(--green);background:rgba(74,222,128,.1);margin:0 -12px;padding:0 12px">${esc(l)}</div>`;
            if (l.startsWith('-') && !l.startsWith('---')) return `<div style="color:var(--rose);background:rgba(251,113,133,.1);margin:0 -12px;padding:0 12px">${esc(l)}</div>`;
            if (l.startsWith('@@')) return `<div style="color:var(--purple);font-weight:700;opacity:.7;margin:0 -12px;padding:0 12px;background:rgba(167,139,250,.05)">${esc(l)}</div>`;
            if (l.startsWith('diff') || l.startsWith('index') || l.startsWith('---') || l.startsWith('+++')) return `<div style="color:var(--dim);margin:0 -12px;padding:0 12px">${esc(l)}</div>`;
            return `<div style="padding:0 12px;margin:0 -12px">${esc(l)}</div>`;
          }).join('') + `</pre>`;
        view.dataset.loaded = 'true';
      } else {
        view.innerHTML = '<div style="padding:12px;color:var(--dim);font-size:11px;font-family:var(--mono)">No changes detected in working tree.</div>';
      }
    } catch(e) {
      view.innerHTML = `<div style="padding:12px;color:var(--rose);font-size:11px;font-family:var(--mono)">Error: ${esc(e.message)}</div>`;
    }
  } else {
    view.style.display = '';
    el.querySelector('span:last-child').style.transform = 'rotate(180deg)';
  }
};

let _mcpIndicatorTimeout = null;
function showMcpIndicator(tool, method, path) {
  const container = document.getElementById('mcp-status-container');
  if (!container) return;
  
  // Remove existing if any
  container.innerHTML = '';
  
  const el = document.createElement('div');
  el.className = 'mcp-indicator';
  el.innerHTML = `
    <div class="icon">🤖</div>
    <div class="body">
      <div class="title">AI is thinking...</div>
      <div class="tool">${tool}</div>
    </div>
    <div class="dots"><span></span><span></span><span></span></div>
  `;
  container.appendChild(el);
  
  clearTimeout(_mcpIndicatorTimeout);
  _mcpIndicatorTimeout = setTimeout(() => {
    el.style.transform = 'translateX(100%)';
    el.style.opacity = '0';
    el.style.transition = 'all .4s ease-in';
    setTimeout(() => el.remove(), 400);
  }, 4000);
}

(async () => {
  window._pid = null;
  await loadSidebar();
  initRealtimeEvents();
  // If URL is /project/:pid, redirect to hash route
  const m = location.pathname.match(/\/project\/(\d+)/);
  if (m && !location.hash) { location.hash = `#/projects/${m[1]}`; return; }
  // If no hash, default to stored active project or home
  if (!location.hash || location.hash === '#') {
    const ap = getActiveProject();
    location.hash = ap ? `#/projects/${ap.id}` : '#/';
    return;
  }
  route();
})();
